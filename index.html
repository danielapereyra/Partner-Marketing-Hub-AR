              <div class="flex gap-3"><div class="text-2xl">✨</div><div><div class="font-bold h-heading">Asistente AI (IA)</div><div class="text-[var(--mid-grey)]">En cada item el detalle muestra acciones inteligentes según el contexto (ej: "Generar copy" si la comm no tiene). Admin tiene chat full, Visualización solo resumen ejecutivo.</div></div></div>
              <div class="flex gap-3"><div class="text-2xl">📚</div><div><div class="font-bold h-heading">Biblioteca</div><div class="text-[var(--mid-grey)]">Templates de copy, briefs/decks, links y casos de éxito. Solo Admin puede agregar/editar.</div></div></div>
              <div class="flex gap-3"><div class="text-2xl">📊</div><div><div class="font-bold h-heading">Insights</div><div class="text-[var(--mid-grey)]">KPIs ejecutivos, distribución, conflictos detectados y slots libres.</div></div></div>
              <div class="flex gap-3"><div class="text-2xl">📥</div><div><div class="font-bold h-heading">Carga masiva</div><div class="text-[var(--mid-grey)]">Subí un doc con tu estrategia o un CSV y la IA detecta items automáticamente.</div></div></div>
            </div>
            <div class="p-6 border-t border-[var(--lightest-grey)] flex justify-end gap-2">
              <button class="btn btn-secondary btn-sm" onclick="showWelcome()">${ic('user','w-3 h-3')} Cambiar rol</button>
              <button class="btn btn-primary btn-sm" onclick="document.getElementById('welcome-modal').classList.remove('open')">Entendido</button>
            </div>
          </div>
        `;
        modal.classList.add('open');
        if (window.lucide) lucide.createIcons();
      }

      // ============== HELPERS ==============
      function fmtDate(d) {
        if (!d) return '—';
        if (typeof d === 'string') d = new Date(d + 'T12:00:00');
        return d.toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric' });
      }
      function fmtDateLong(d) {
        if (typeof d === 'string') d = new Date(d + 'T12:00:00');
        return d.toLocaleDateString('es-AR', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
      }
      function sameDay(a, b) { return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate(); }
      function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
      function endOfMonth(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 0); }
      function addMonths(d, n) { return new Date(d.getFullYear(), d.getMonth() + n, 1); }
      function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
      function ic(name, cls='w-4 h-4') { return `<i data-lucide="${name}" class="${cls}"></i>`; }
      function slug() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

      // Filtering logic (includes benefits as virtual items in calendar views)
      function filtered() {
        const q = state.search.toLowerCase().trim();
        const source = state.view === 'calendar' ? getAllCalendarItems() : state.items;
        return source.filter(it => {
          if (state.filters.tipo !== 'all' && it.tipo !== state.filters.tipo) return false;
          if (state.filters.categoria.size && !state.filters.categoria.has(it.categoria)) return false;
          if (state.filters.status.size && !state.filters.status.has(statusOf(it))) return false;
          if (q) {
            const hay = [it.titulo, it.contenido, it.copy, it.tag, ...(it.owners||[]), ...(it.audiencia||[]), ...(it.canales||[])].join(' ').toLowerCase();
            if (!hay.includes(q)) return false;
          }
          return true;
        });
      }

      // ============== FILTERS UI ==============
      function renderFilters() {
        const wrapper = document.getElementById('filter-wrapper');
        // Hide filters entirely on Library, AI, Insights, Benefits views (no apply there)
        if (['library','ai','insights','benefits'].includes(state.view)) { wrapper.style.display = 'none'; return; }
        wrapper.style.display = '';

        // Segmented Tipo
        const tipoEl = document.getElementById('filter-tipo');
        const counts = {
          all: state.items.length,
          accion: state.items.filter(it => it.tipo === 'accion').length,
          comunicacion: state.items.filter(it => it.tipo === 'comunicacion').length,
        };
        tipoEl.innerHTML = `
          <button class="seg-btn ${state.filters.tipo==='all'?'active':''}" onclick="setTipo('all')">${ic('layers','w-4 h-4')} Todo <span class="count">${counts.all}</span></button>
          <button class="seg-btn ${state.filters.tipo==='accion'?'active':''}" onclick="setTipo('accion')">${ic('zap','w-4 h-4')} Acciones <span class="count">${counts.accion}</span></button>
          <button class="seg-btn ${state.filters.tipo==='comunicacion'?'active':''}" onclick="setTipo('comunicacion')">${ic('send','w-4 h-4')} Comunicaciones <span class="count">${counts.comunicacion}</span></button>
        `;

        // Category dropdown (compact multiselect, sólo visible al elegir tipo)
        const catWrap = document.getElementById('filter-cat-wrap');
        let cats = Object.entries(CATEGORIES).filter(([k,v]) => ['accion','comunicacion'].includes(v.tipo));
        if (state.filters.tipo !== 'all') cats = cats.filter(([k,v]) => v.tipo === state.filters.tipo);
        const showCat = state.filters.tipo !== 'all';
        const selCount = state.filters.categoria.size;
        if (showCat) {
          const label = selCount ? `${selCount} categoría${selCount===1?'':'s'}` : 'Todas las categorías';
          catWrap.innerHTML = `
            <details class="relative" id="cat-dropdown">
              <summary class="chip ${selCount?'chip-on':'chip-off'}" style="padding:8px 14px">
                ${ic('filter','w-3 h-3')} ${label} ${ic('chevron-down','w-3 h-3 chev')}
              </summary>
              <div class="absolute left-0 mt-2 bg-white rounded-2xl card-shadow border border-[var(--lightest-grey)] p-2 z-50 min-w-[240px] max-h-[300px] overflow-y-auto scroll-v" onclick="event.stopPropagation()">
                <button class="w-full text-left px-3 py-2 rounded-lg text-xs font-semibold ${selCount===0?'bg-[var(--clear-blue-bg)] text-[var(--nimbus-blue)]':'hover:bg-[var(--light-grey-bg)]'}" onclick="clearCatFilter()">${ic('check-check','w-3 h-3 inline')} Ver todas</button>
                <div class="border-t border-[var(--lightest-grey)] my-1"></div>
                ${cats.map(([k,v]) => {
                  const count = state.items.filter(it => it.categoria === k).length;
                  if (count === 0) return '';
                  const checked = state.filters.categoria.has(k);
                  return `<label class="flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer hover:bg-[var(--clear-blue-bg)]">
                    <input type="checkbox" ${checked?'checked':''} onchange="toggleCatFilter('${k}')" class="accent-[var(--nimbus-blue)]" />
                    <span class="pill cat-${k}">${ic(v.icon,'w-3 h-3')} ${v.label}</span>
                    <span class="text-[10px] text-[var(--mid-grey)] ml-auto">${count}</span>
                  </label>`;
                }).join('')}
              </div>
            </details>
          `;
          // close dropdown on outside click
          setTimeout(() => {
            document.addEventListener('click', closeDropdownOutside, { once: true });
          }, 0);
        } else {
          catWrap.innerHTML = '';
        }

        // Status buttons
        document.querySelectorAll('.st-filter').forEach(b => {
          const s = b.dataset.status;
          b.classList.toggle('active', state.filters.status.has(s));
          b.onclick = () => toggleStatus(s);
        });

        // Clear button visibility
        const anyFilter = state.filters.tipo !== 'all' || state.filters.categoria.size || state.filters.status.size || state.search;
        const clearBtn = document.getElementById('clear-all-btn');
        if (clearBtn) {
          clearBtn.classList.toggle('hidden', !anyFilter);
          clearBtn.onclick = clearAllFilters;
        }
      }
      function closeDropdownOutside(e) {
        const dd = document.getElementById('cat-dropdown');
        if (dd && !dd.contains(e.target)) dd.removeAttribute('open');
      }
      function setTipo(t) { state.filters.tipo = t; state.filters.categoria.clear(); renderAll(); }
      function toggleCatFilter(k) {
        if (state.filters.categoria.has(k)) state.filters.categoria.delete(k); else state.filters.categoria.add(k);
        renderAll();
      }
      function clearCatFilter() { state.filters.categoria.clear(); renderAll(); }
      function toggleStatus(s) {
        if (state.filters.status.has(s)) state.filters.status.delete(s); else state.filters.status.add(s);
        renderAll();
      }
      function clearAllFilters() {
        state.filters.tipo='all'; state.filters.categoria.clear(); state.filters.status.clear();
        state.search=''; document.getElementById('searchInput').value=''; renderAll();
      }
      document.getElementById('searchInput').addEventListener('input', e => { state.search = e.target.value; renderAll(); });

      // ============== CALENDAR VIEW ==============
      function renderCalendar() {
        const cursor = state.cursor;
        const items = filtered();

        if (state.calMode === 'day') return renderDay(cursor, items);
        if (state.calMode === 'week') return renderWeek(cursor, items);
        if (state.calMode === 'quarter') return renderQuarter(cursor, items);
        // fallthrough month
        if (state.calMode === 'month') {
          const first = startOfMonth(cursor);
          const last = endOfMonth(cursor);
          let startWeekday = (first.getDay() + 6) % 7;
          const cells = [];
          for (let i = startWeekday; i > 0; i--) { const d = new Date(first); d.setDate(first.getDate() - i); cells.push({ d, otherMonth: true }); }
          for (let day = 1; day <= last.getDate(); day++) { cells.push({ d: new Date(cursor.getFullYear(), cursor.getMonth(), day), otherMonth: false }); }
          while (cells.length % 7 !== 0 || cells.length < 35) {
            const lastCell = cells[cells.length-1].d; const d = new Date(lastCell); d.setDate(lastCell.getDate()+1);
            cells.push({ d, otherMonth: true });
          }
          if (cells.length === 35) {
            for (let i = 0; i < 7; i++) { const d = new Date(cells[cells.length-1].d); d.setDate(d.getDate()+1); cells.push({ d, otherMonth: true }); }
          }

          const itemsByDate = {};
          items.forEach(it => { if (!it.fecha) return; (itemsByDate[it.fecha] ||= []).push(it); });

          const monthName = cursor.toLocaleDateString('es-AR',{month:'long',year:'numeric'});

          // Status counts in this month
          const monthItems = items.filter(it => it.fecha && it.fecha.startsWith(cursor.toISOString().slice(0,7)));
          const stCounts = {
            pendiente: monthItems.filter(it => statusOf(it)==='pendiente').length,
            programado: monthItems.filter(it => statusOf(it)==='programado').length,
            finalizado: monthItems.filter(it => statusOf(it)==='finalizado').length,
            on_hold: monthItems.filter(it => statusOf(it)==='on_hold').length,
          };
          const sinFecha = items.filter(it => !it.fecha).length;

          const headerHTML = `
            <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
              <div class="flex items-center gap-2">
                <button class="btn btn-ghost" onclick="navMonth(-1)">${ic('chevron-left','w-5 h-5')}</button>
                <h2 class="text-2xl font-extrabold h-heading capitalize">${monthName}</h2>
                <button class="btn btn-ghost" onclick="navMonth(1)">${ic('chevron-right','w-5 h-5')}</button>
                <button class="btn btn-ghost text-sm" onclick="navToday()">Hoy</button>
              </div>
              <div class="flex items-center gap-3">
                <div class="hidden md:flex items-center gap-3 text-xs text-[var(--mid-grey)]">
                  <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full" style="background:var(--st-pendiente)"></span>${stCounts.pendiente} pendiente</span>
                  <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full" style="background:var(--st-programado)"></span>${stCounts.programado} programado</span>
                  <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full" style="background:var(--st-finalizado)"></span>${stCounts.finalizado} finalizado</span>
                  ${stCounts.on_hold ? `<span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full" style="background:var(--st-on_hold)"></span>${stCounts.on_hold} on hold</span>` : ''}
                </div>
                ${calModeToggleHTML()}
              </div>
            </div>
          `;

          const daysLabel = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
          const headRow = daysLabel.map(d=>`<div class="cal-head">${d}</div>`).join('');

          const cellsHTML = cells.map(c => {
            const key = c.d.toISOString().slice(0,10);
            const dayItems = (itemsByDate[key] || []).sort((a,b) => {
              // urgent first: pendiente > programado > finalizado
              const order = { pendiente: 0, programado: 1, on_hold: 2, finalizado: 3 };
              return (order[statusOf(a)]||9) - (order[statusOf(b)]||9);
            });
            const isToday = sameDay(c.d, today);
            const visible = dayItems.slice(0,3);
            const eventsHTML = visible.map(it => {
              const cat = CATEGORIES[it.categoria];
              const st = statusOf(it);
              const clickHandler = it._benefit_id ? `openBenefitDetail('${it._benefit_id}')` : `openDetail('${it.id}')`;
              return `<div class="cal-event cat-${it.categoria}" onclick="event.stopPropagation(); ${clickHandler}" title="${escapeHtml(it.titulo)} · ${STATUSES[st].label}${it._benefit_id?' · Beneficio Agencias':''}">
                <span class="st-dot ${st}"></span>
                ${ic(cat.icon, 'w-3 h-3 shrink-0')}
                <span class="cal-event-title">${it._benefit_id?'🎁 ':''}${escapeHtml(it.titulo.replace(/^\[[^\]]+\]\s*/, '').replace(/^[⚡]+/,''))}</span>
              </div>`;
            }).join('');
            const more = dayItems.length > 3 ? `<div class="cal-more" onclick="event.stopPropagation(); openDayList('${key}')">+${dayItems.length-3} más</div>` : '';
            return `<div class="cal-cell ${c.otherMonth?'other-month':''} ${isToday?'today':''}" onclick="openDayList('${key}')">
              <span class="cal-daynum">${c.d.getDate()}</span>
              ${eventsHTML}${more}
            </div>`;
          }).join('');

          // Sin fecha section
          const sinFechaSection = sinFecha ? `
            <div class="mt-6 bg-white rounded-2xl card-shadow p-4">
              <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm font-bold h-heading flex items-center gap-2">${ic('alert-circle','w-4 h-4 text-[#92400e]')} Sin fecha definida</h3>
                <span class="text-xs text-[var(--mid-grey)]">${sinFecha} ítem${sinFecha===1?'':'s'} · TBD</span>
              </div>
              <div class="flex flex-wrap gap-2">
                ${items.filter(it => !it.fecha).slice(0,12).map(it => `
                  <button class="chip chip-off" onclick="openDetail('${it.id}')">${ic(CATEGORIES[it.categoria].icon,'w-3 h-3')} ${escapeHtml(it.titulo.slice(0,40))}${it.titulo.length>40?'…':''}</button>
                `).join('')}
                ${sinFecha > 12 ? `<button class="chip chip-off" onclick="setView('list')">+${sinFecha-12} más</button>` : ''}
              </div>
            </div>
          ` : '';

          // Legend
          const legend = `
            <div class="flex items-center flex-wrap gap-3 mt-4 px-1">
              <span class="text-[11px] uppercase tracking-widest text-[var(--light-grey)] font-semibold">Categorías visibles</span>
              ${Object.entries(CATEGORIES).filter(([k]) => items.some(it=>it.categoria===k)).map(([k,v]) => `<span class="pill cat-${k}">${v.label}</span>`).join('')}
            </div>
          `;

          return headerHTML + `<div class="cal-grid">${headRow}${cellsHTML}</div>` + sinFechaSection + legend;
        }
      }
      function calModeToggleHTML() {
        const modes = [['quarter','Trimestre'],['month','Mes'],['week','Semana'],['day','Día']];
        return `<div class="inline-flex bg-white border border-[var(--lightest-grey)] rounded-full p-1">
          ${modes.map(([k,l]) => `<button class="chip ${state.calMode===k?'chip-on':'chip-off'} border-none" onclick="setCalMode('${k}')">${l}</button>`).join('')}
        </div>`;
      }
      function renderQuarter(cursor, items) {
          const q = Math.floor(cursor.getMonth() / 3);
          const qStart = new Date(cursor.getFullYear(), q*3, 1);
          const qEnd = new Date(cursor.getFullYear(), q*3+3, 0);
          const weeks = [];
          let cur = new Date(qStart);
          while ((cur.getDay()+6)%7 !== 0) cur.setDate(cur.getDate()-1);
          while (cur <= qEnd) {
            const wStart = new Date(cur);
            const wEnd = new Date(cur); wEnd.setDate(wEnd.getDate()+6);
            weeks.push({ start: new Date(wStart), end: new Date(wEnd) });
            cur.setDate(cur.getDate()+7);
          }
          const cols = weeks.length;
          const cats = Object.keys(CATEGORIES).filter(k => items.some(it => it.categoria === k));
          const headerHTML = `
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center gap-2">
                <button class="btn btn-ghost" onclick="navMonth(-3)">${ic('chevron-left','w-5 h-5')}</button>
                <h2 class="text-2xl font-extrabold h-heading">Q${q+1} ${cursor.getFullYear()}</h2>
                <button class="btn btn-ghost" onclick="navMonth(3)">${ic('chevron-right','w-5 h-5')}</button>
                <button class="btn btn-ghost text-sm" onclick="navToday()">Hoy</button>
              </div>
              ${calModeToggleHTML()}
            </div>
          `;
          const monthHeader = `
            <div class="grid" style="grid-template-columns: 140px repeat(${cols}, 1fr); border-bottom: 1px solid var(--lightest-grey);">
              <div></div>
              ${weeks.map(w => {
                const isToday = today >= w.start && today <= w.end;
                return `<div class="text-[10px] text-center py-2 font-semibold ${isToday?'bg-[var(--clear-blue-bg)] text-[var(--nimbus-blue)]':'text-[var(--mid-grey)]'}">${w.start.getDate()}/${w.start.getMonth()+1}</div>`;
              }).join('')}
            </div>
          `;
          const rowsHTML = cats.map(catKey => {
            const cat = CATEGORIES[catKey];
            const inCat = items.filter(it => it.categoria === catKey && it.fecha);
            if (!inCat.length) return '';
            const cells = weeks.map(w => {
              const inWeek = inCat.filter(it => { const d = new Date(it.fecha+'T12:00:00'); return d >= w.start && d <= w.end; });
              return `<div style="position:relative;min-height:56px;border-right:1px solid var(--lightest-grey);padding:4px;">
                ${inWeek.map(it => {
                  const st = statusOf(it);
                  return `<div class="flex items-center gap-1 px-1.5 py-1 mb-1 rounded text-[10px] font-semibold cat-${catKey}" onclick="openDetail('${it.id}')" style="cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(it.titulo)}">
                    <span class="st-dot ${st}" style="width:6px;height:6px;border:none;box-shadow:none;flex-shrink:0"></span>
                    <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(it.titulo.replace(/^\[[^\]]+\]\s*/, '').slice(0,30))}</span>
                  </div>`;
                }).join('')}
              </div>`;
            }).join('');
            return `<div class="grid" style="grid-template-columns: 140px repeat(${cols}, 1fr); border-bottom: 1px solid var(--lightest-grey); background:#fff;">
              <div style="padding:12px 14px;font-size:12px;font-weight:700;color:var(--dark-blue);background:#fff;border-right:1px solid var(--lightest-grey);display:flex;align-items:center;gap:8px;"><span class="pill cat-${catKey}">${cat.label}</span></div>
              ${cells}
            </div>`;
          }).join('');
          return headerHTML + `<div class="bg-white rounded-2xl card-shadow overflow-hidden">${monthHeader}${rowsHTML}</div>`;
      }

      function renderWeek(cursor, items) {
        // Compute Monday of the week containing cursor
        const start = new Date(cursor);
        const wd = (start.getDay() + 6) % 7;
        start.setDate(start.getDate() - wd);
        const days = [];
        for (let i = 0; i < 7; i++) {
          const d = new Date(start); d.setDate(start.getDate() + i);
          days.push(d);
        }
        const itemsByDate = {};
        items.forEach(it => { if (it.fecha) (itemsByDate[it.fecha] ||= []).push(it); });
        const todayKey = today.toISOString().slice(0,10);
        const startStr = days[0].toLocaleDateString('es-AR',{day:'2-digit',month:'short'});
        const endStr = days[6].toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'});

        const colsHTML = days.map(d => {
          const key = d.toISOString().slice(0,10);
          const dayItems = (itemsByDate[key] || []).sort((a,b) => {
            const o = { pendiente:0, programado:1, on_hold:2, finalizado:3 };
            return (o[statusOf(a)]||9) - (o[statusOf(b)]||9);
          });
          const isToday = key === todayKey;
          return `
            <div class="week-col ${isToday?'today':''}">
              <div class="week-col-head ${isToday?'':''}" style="${isToday?'background:var(--nimbus-blue);':''}">
                <div>${d.toLocaleDateString('es-AR',{weekday:'short'}).toUpperCase()}</div>
                <div class="num">${d.getDate()}</div>
                <div class="text-[10px] opacity-80">${d.toLocaleDateString('es-AR',{month:'short'})}</div>
              </div>
              <div class="pt-2">
                ${dayItems.map(it => {
                  const cat = CATEGORIES[it.categoria]; const st = statusOf(it);
                  const color = ({pendiente:'#ef4444',programado:'#eab308',finalizado:'#16a34a',on_hold:'#f97316'})[st];
                  return `<div class="week-card" style="border-left-color:${color}" onclick="openDetail('${it.id}')">
                    <div class="flex items-center gap-1 mb-1">
                      <span class="st-dot ${st}" style="width:6px;height:6px;border:none;box-shadow:none"></span>
                      <span class="pill cat-${it.categoria}" style="padding:1px 6px;font-size:9px">${cat.label}</span>
                    </div>
                    <div class="text-xs font-bold text-[var(--dark-blue)] truncate-2 leading-snug">${escapeHtml(it.titulo.replace(/^\[[^\]]+\]\s*/,''))}</div>
                    ${it.audiencia?.length ? `<div class="text-[10px] text-[var(--mid-grey)] mt-1">${it.audiencia.join(' · ')}</div>` : ''}
                  </div>`;
                }).join('') || `<div class="text-center text-[10px] text-[var(--mid-grey)] opacity-50 py-4">—</div>`}
                ${isAdmin() ? `<button class="w-full text-xs text-[var(--nimbus-blue)] font-semibold py-1 mt-1 hover:bg-[var(--clear-blue-bg)] rounded" onclick="openNewActionDrawer('${key}')">${ic('plus','w-3 h-3 inline')} Sumar</button>` : ''}
              </div>
            </div>
          `;
        }).join('');

        return `
          <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
            <div class="flex items-center gap-2">
              <button class="btn btn-ghost" onclick="navWeek(-1)">${ic('chevron-left','w-5 h-5')}</button>
              <h2 class="text-2xl font-extrabold h-heading">Semana del ${startStr} al ${endStr}</h2>
              <button class="btn btn-ghost" onclick="navWeek(1)">${ic('chevron-right','w-5 h-5')}</button>
              <button class="btn btn-ghost text-sm" onclick="navToday()">Hoy</button>
            </div>
            ${calModeToggleHTML()}
          </div>
          <div class="week-grid">${colsHTML}</div>
        `;
      }

      function renderDay(cursor, items) {
        const key = cursor.toISOString().slice(0,10);
        const todayKey = today.toISOString().slice(0,10);
        const isToday = key === todayKey;
        const dayItems = items.filter(it => it.fecha === key).sort((a,b)=>{
          const o = { pendiente:0, programado:1, on_hold:2, finalizado:3 };
          return (o[statusOf(a)]||9) - (o[statusOf(b)]||9);
        });

        const cardsHTML = dayItems.length ? dayItems.map(it => {
          const cat = CATEGORIES[it.categoria]; const st = statusOf(it);
          const copy = it.copy || '';
          return `
            <div class="bg-white rounded-2xl card-shadow overflow-hidden mb-4">
              <div class="px-5 py-4 flex items-center gap-2 flex-wrap border-b border-[var(--lightest-grey)]">
                <span class="pill cat-${it.categoria}">${ic(cat.icon,'w-3 h-3')} ${cat.label}</span>
                <span class="pill status-${st}"><span class="st-dot ${st}" style="width:6px;height:6px;border:none;box-shadow:none"></span> ${STATUSES[st].label}</span>
                ${it.prioridad ? `<span class="pill priority-${it.prioridad}">${it.prioridad}</span>` : ''}
                ${it.tag ? `<span class="pill" style="background:#f0f1f5;color:#494b4d">${it.tag}</span>` : ''}
                <div class="ml-auto flex items-center gap-1">
                  <button class="btn btn-ghost btn-xs" onclick="openDetail('${it.id}')" title="Ver detalle">${ic('eye','w-3 h-3')}</button>
                  ${isAdmin() ? `<button class="btn btn-ghost btn-xs" onclick="openEditDrawer('${it.id}')" title="Editar">${ic('pencil','w-3 h-3')}</button>` : ''}
                </div>
              </div>
              <div class="px-5 py-4">
                <h3 class="text-lg font-extrabold h-heading mb-2">${escapeHtml(it.titulo)}</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs mb-3">
                  ${it.audiencia?.length ? `<div><div class="text-[10px] uppercase text-[var(--mid-grey)] font-semibold">Audiencia</div><div class="font-semibold">${it.audiencia.join(', ')}</div></div>` : ''}
                  ${it.canales?.length ? `<div><div class="text-[10px] uppercase text-[var(--mid-grey)] font-semibold">Canales</div><div class="font-semibold">${it.canales.join(', ')}</div></div>` : ''}
                  ${it.formato ? `<div><div class="text-[10px] uppercase text-[var(--mid-grey)] font-semibold">Formato</div><div class="font-semibold">${escapeHtml(it.formato)}</div></div>` : ''}
                  ${it.owners?.length ? `<div><div class="text-[10px] uppercase text-[var(--mid-grey)] font-semibold">Owners</div><div class="font-semibold">${it.owners.join(', ')}</div></div>` : ''}
                </div>
                ${it.contenido ? `<p class="text-sm mb-3">${escapeHtml(it.contenido)}</p>` : ''}
                ${copy ? `<div class="relative"><div class="bg-[var(--clear-blue-bg)] border border-[var(--lightest-grey)] rounded-xl p-3 pr-12 text-sm whitespace-pre-line">${escapeHtml(copy)}</div><button class="absolute top-2 right-2 btn btn-secondary btn-xs" onclick="copyText(${JSON.stringify(JSON.stringify(copy))}, 'day-${it.id}')">${ic('copy','w-3 h-3')} <span id="cbtxt-day-${it.id}">Copiar</span></button></div>` : ''}
              </div>
            </div>
          `;
        }).join('') : `<div class="bg-white rounded-2xl card-shadow p-10 text-center"><div class="w-12 h-12 mx-auto rounded-full bg-[var(--clear-blue-bg)] flex items-center justify-center mb-3">${ic('calendar-x','w-6 h-6 text-[var(--mid-grey)]')}</div><p class="text-sm text-[var(--mid-grey)] mb-3">Sin items agendados este día.</p>${isAdmin()?`<button class="btn btn-primary" onclick="openNewActionDrawer('${key}')">${ic('plus','w-4 h-4')} Sumar acción</button>`:''}</div>`;

        return `
          <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
            <div class="flex items-center gap-2">
              <button class="btn btn-ghost" onclick="navDay(-1)">${ic('chevron-left','w-5 h-5')}</button>
              <h2 class="text-2xl font-extrabold h-heading capitalize">${fmtDateLong(key)}</h2>
              <button class="btn btn-ghost" onclick="navDay(1)">${ic('chevron-right','w-5 h-5')}</button>
              <button class="btn btn-ghost text-sm" onclick="navToday()">Hoy</button>
              ${isToday ? `<span class="pill" style="background:var(--clear-blue);color:var(--nimbus-blue)">HOY</span>` : ''}
            </div>
            ${calModeToggleHTML()}
          </div>
          ${cardsHTML}
        `;
      }
      function navMonth(n) { state.cursor = addMonths(state.cursor, n); renderAll(); }
      function navWeek(n) { const d = new Date(state.cursor); d.setDate(d.getDate() + n*7); state.cursor = d; renderAll(); }
      function navDay(n) { const d = new Date(state.cursor); d.setDate(d.getDate() + n); state.cursor = d; renderAll(); }
      function navToday() { state.cursor = new Date(today); renderAll(); }
      function setCalMode(m) { state.calMode = m; renderAll(); }

      // ============== STRATEGY VIEW (briefing mensual SOLO de comunicaciones) ==============
      function renderStrategy() {
        const monthKey = state.stratMonth;
        const [Y, M] = monthKey.split('-').map(Number);
        const cursor = new Date(Y, M-1, 1);

        // Solo comunicaciones del mes (todas las categorías de tipo comunicacion)
        const comms = state.items
          .filter(it => it.tipo === 'comunicacion' && it.fecha && it.fecha.startsWith(monthKey))
          .sort((a,b) => a.fecha.localeCompare(b.fecha));
        const todayKey = today.toISOString().slice(0,10);
        const monthName = cursor.toLocaleDateString('es-AR',{month:'long',year:'numeric'});

        const totals = {
          pendiente: comms.filter(it => statusOf(it)==='pendiente').length,
          programado: comms.filter(it => statusOf(it)==='programado').length,
          finalizado: comms.filter(it => statusOf(it)==='finalizado').length,
          atrasadas: comms.filter(it => statusOf(it)!=='finalizado' && it.fecha < todayKey).length,
        };

        // Today's tracker
        const todayComms = comms.filter(it => it.fecha === todayKey);
        const trackerHTML = `
          <div class="bg-white rounded-2xl card-shadow p-5 mb-5">
            <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
              <div>
                <h3 class="text-lg font-bold h-heading flex items-center gap-2">${ic('target','w-5 h-5 text-[var(--nimbus-blue)]')} Tracker de hoy</h3>
                <p class="text-xs text-[var(--mid-grey)]">${fmtDateLong(todayKey)} · ${todayComms.length} comm${todayComms.length===1?'':'s'} agendada${todayComms.length===1?'':'s'}</p>
              </div>
              ${totals.atrasadas ? `<span class="pill status-pendiente">${ic('alert-triangle','w-3 h-3')} ${totals.atrasadas} atrasada${totals.atrasadas===1?'':'s'} este mes</span>` : ''}
            </div>
            ${todayComms.length ? `<div class="space-y-2">${todayComms.map(it => {
              const st = statusOf(it); const cat = CATEGORIES[it.categoria];
              return `<div class="flex items-center gap-3 p-3 rounded-xl border border-[var(--lightest-grey)] hover:border-[var(--nimbus-blue)] cursor-pointer" onclick="openDetail('${it.id}')">
                ${isAdmin() ? `<label class="flex items-center" onclick="event.stopPropagation()">
                  <input type="checkbox" ${st==='finalizado'?'checked':''} onclick="event.stopPropagation(); markSent('${it.id}', this.checked)" class="w-5 h-5 accent-[var(--success)]" />
                </label>` : `<span class="st-dot ${st}" style="width:10px;height:10px;border:none;box-shadow:none"></span>`}
                <span class="pill cat-${it.categoria}">${ic(cat.icon,'w-3 h-3')} ${cat.label}</span>
                <div class="flex-1 min-w-0">
                  <div class="font-semibold ${st==='finalizado'?'line-through text-[var(--mid-grey)]':'text-[var(--dark-blue)]'} truncate">${escapeHtml(it.titulo)}</div>
                  <div class="text-xs text-[var(--mid-grey)] truncate">${(it.audiencia||[]).join(' · ')}</div>
                </div>
                <span class="pill status-${st}">${STATUSES[st].label}</span>
              </div>`;
            }).join('')}</div>` : `<div class="text-sm text-[var(--mid-grey)] py-4 text-center">Nada agendado para hoy ✨</div>`}
          </div>
        `;

        // Group by day, only days with at least one comm
        const byDay = {};
        comms.forEach(c => { (byDay[c.fecha] ||= []).push(c); });
        const dayKeys = Object.keys(byDay).sort();

        // Day cards with FULL copy visible + per-comm copy button
        const daysHTML = dayKeys.length ? dayKeys.map(dk => {
          const dateObj = new Date(dk + 'T12:00:00');
          const isToday = dk === todayKey;
          const isPast = dk < todayKey;
          const dayName = dateObj.toLocaleDateString('es-AR',{weekday:'long',day:'2-digit',month:'long'});
          return `
            <div class="mb-5">
              <div class="flex items-center gap-3 mb-2 px-1">
                <div class="w-12 text-center shrink-0">
                  <div class="text-xs ${isToday?'text-[var(--nimbus-blue)] font-bold':'text-[var(--mid-grey)] font-semibold'} uppercase">${dateObj.toLocaleDateString('es-AR',{month:'short'})}</div>
                  <div class="text-3xl font-extrabold ${isToday?'text-[var(--nimbus-blue)]':'h-heading'} leading-none">${dateObj.getDate()}</div>
                </div>
                <div class="flex-1">
                  <h3 class="text-sm font-bold h-heading capitalize">${dayName}</h3>
                  <div class="text-xs text-[var(--mid-grey)]">${byDay[dk].length} comm${byDay[dk].length===1?'':'s'}</div>
                </div>
                ${isToday ? `<span class="pill" style="background:var(--clear-blue);color:var(--nimbus-blue)">HOY</span>` : ''}
                ${isPast && !isToday ? `<span class="pill" style="background:#f0f1f5;color:#494b4d">Pasado</span>` : ''}
                ${isAdmin() ? `<button class="btn btn-ghost btn-xs" onclick="openNewActionDrawer('${dk}','email')">${ic('plus','w-3 h-3')} Sumar comm</button>` : ''}
              </div>

              <div class="space-y-3 ml-15" style="margin-left:60px">
                ${byDay[dk].map(it => {
                  const st = statusOf(it); const cat = CATEGORIES[it.categoria];
                  const late = st !== 'finalizado' && it.fecha < todayKey;
                  const copy = it.copy || it.contenido || '';
                  return `
                    <div class="bg-white rounded-2xl border ${late?'border-[#fde2e2]':'border-[var(--lightest-grey)]'} card-shadow overflow-hidden">
                      <div class="px-4 py-3 flex items-center gap-2 flex-wrap border-b border-[var(--lightest-grey)] bg-[var(--light-grey-bg)]">
                        <span class="pill cat-${it.categoria}">${ic(cat.icon,'w-3 h-3')} ${cat.label}</span>
                        <span class="pill status-${st}"><span class="st-dot ${st}" style="width:6px;height:6px;border:none;box-shadow:none"></span> ${STATUSES[st].label}</span>
                        ${it.prioridad ? `<span class="pill priority-${it.prioridad}">${it.prioridad}</span>` : ''}
                        ${late ? `<span class="pill status-pendiente">${ic('alert-triangle','w-3 h-3')} Atrasada</span>` : ''}
                        <span class="text-xs text-[var(--mid-grey)] ml-auto">${(it.audiencia||[]).map(a => `<span class="pill" style="background:#fff;color:#494b4d;border:1px solid var(--lightest-grey);margin-left:4px">${a}</span>`).join('')}</span>
                      </div>
                      <div class="p-4">
                        <h4 class="font-bold h-heading mb-1">${escapeHtml(it.titulo)}</h4>
                        ${it.pilar ? `<div class="text-xs text-[var(--mid-grey)] mb-2">Pilar: <span class="font-semibold">${escapeHtml(it.pilar)}</span></div>` : ''}
                        ${copy ? `
                          <div class="relative">
                            <div class="bg-[var(--clear-blue-bg)] border border-[var(--lightest-grey)] rounded-xl p-3 pr-12 text-sm whitespace-pre-line" id="copy-content-${it.id}">${escapeHtml(copy)}</div>
                            <button class="absolute top-2 right-2 btn btn-secondary btn-xs" title="Copiar contenido" onclick="copyText(${JSON.stringify(JSON.stringify(copy))}, '${it.id}')">${ic('copy','w-3 h-3')} <span id="cbtxt-${it.id}">Copiar</span></button>
                          </div>
                        ` : `<div class="text-xs text-[var(--mid-grey)] italic">Sin copy cargado</div>`}
                      </div>
                      <div class="px-4 py-2 border-t border-[var(--lightest-grey)] flex items-center gap-2 text-xs">
                        <span class="text-[var(--mid-grey)]">Owners: ${(it.owners||['—']).join(', ')}</span>
                        ${(it.links||[]).slice(0,2).map(l => `<a href="${l.url||'#'}" target="_blank" class="text-[var(--nimbus-blue)] font-semibold">${ic('external-link','w-3 h-3 inline')} ${escapeHtml(l.label)}</a>`).join(' · ')}
                        <button class="btn btn-ghost btn-xs ml-auto" onclick="openDetail('${it.id}')">${ic('eye','w-3 h-3')} Ver detalle</button>
                        ${isAdmin() ? `<button class="btn btn-ghost btn-xs" onclick="openEditDrawer('${it.id}')">${ic('pencil','w-3 h-3')} Editar</button>` : ''}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `;
        }).join('') : `<div class="bg-white rounded-2xl card-shadow p-10 text-center"><p class="text-sm text-[var(--mid-grey)] mb-3">No hay comunicaciones cargadas este mes.</p><button class="btn btn-primary" onclick="openBulkUpload()">${ic('upload','w-4 h-4')} Cargar estrategia masiva</button></div>`;

        // Initial default view: Overview (vista ejecutiva para aprobación)
        state.stratView = state.stratView || 'overview';
        const isOverview = state.stratView === 'overview';

        // Toggle View
        const viewToggleHTML = `
          <div class="inline-flex bg-white border border-[#e4e4e7] rounded-lg p-0.5">
            <button class="chip ${isOverview?'chip-on':'chip-off'} border-none" onclick="setStratView('overview')">${ic('layout-dashboard','w-3 h-3')} Overview</button>
            <button class="chip ${!isOverview?'chip-on':'chip-off'} border-none" onclick="setStratView('detalle')">${ic('list','w-3 h-3')} Detalle</button>
          </div>
        `;

        let bodyHTML = '';
        if (isOverview) {
          bodyHTML = renderStrategyOverviewView(monthKey, comms);
        } else {
          // Vista detalle: contexto + days HTML
          const infoBar = `<div class="bg-white rounded-2xl card-shadow p-4 mb-5 flex items-center gap-3 flex-wrap">
            <p class="text-sm text-[var(--text-dark)] flex-1"><strong class="h-heading">${comms.length} comunicaciones</strong> en ${monthName}. Cada bloque tiene el copy completo listo para copiar y pegar. Usá <strong>Copiar mes completo</strong> para bajar todo a tu portapapeles en formato texto plano (emojis incluidos).</p>
          </div>`;
          bodyHTML = infoBar + daysHTML;
        }

        return `
          <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
            <div class="flex items-center gap-2">
              <button class="btn btn-ghost" onclick="stratNav(-1)">${ic('chevron-left','w-5 h-5')}</button>
              <h2 class="text-2xl font-extrabold h-heading capitalize">Estrategia · ${monthName}</h2>
              <button class="btn btn-ghost" onclick="stratNav(1)">${ic('chevron-right','w-5 h-5')}</button>
              <span class="text-xs text-[var(--mid-grey)] ml-2">Solo comunicaciones</span>
            </div>
            <div class="flex items-center gap-2 flex-wrap">
              ${viewToggleHTML}
              <span class="text-xs text-[var(--mid-grey)] flex items-center gap-3 mr-1 ml-1">
                <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full" style="background:var(--st-pendiente)"></span>${totals.pendiente}</span>
                <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full" style="background:var(--st-programado)"></span>${totals.programado}</span>
                <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full" style="background:var(--st-finalizado)"></span>${totals.finalizado}</span>
              </span>
              <button class="btn btn-secondary btn-sm" onclick="copyAllMonth('${monthKey}')">${ic('clipboard-copy','w-3 h-3')} Copiar mes completo</button>
              <button class="btn btn-secondary btn-sm" onclick="exportMonthTxt('${monthKey}')">${ic('download','w-3 h-3')} Exportar .txt</button>
              ${isAdmin() ? `<button class="btn btn-secondary btn-sm" onclick="openBulkUpload()">${ic('upload','w-3 h-3')} Cargar masiva</button>
              <button class="btn btn-primary btn-sm" onclick="openNewActionDrawer('${monthKey}-15','email')">${ic('plus','w-3 h-3')} Nueva comm</button>` : ''}
            </div>
          </div>
          ${trackerHTML}
          ${bodyHTML}
        `;
      }
      function setStratView(v) { state.stratView = v; renderAll(); }

      // Agrupador inteligente de comms por proyecto/tema (basado en tag + título)
      function groupCommsByTheme(comms) {
        const groups = {
          'prode':       { label: '🏆 Prode Mundial 2026',      desc: 'Gamification del Mundial · 3 partidos de Argentina + rankings semanales',  color: '#16a34a', icon: 'trophy',     priority: 1, items: [] },
          'lanzamiento': { label: '📽 Lanzamientos y Webinars',   desc: 'Product Digest del mes + lanzamiento Lumi · convocatorias y FOMO',       color: '#9333ea', icon: 'megaphone',  priority: 2, items: [] },
          'tecnomoda':   { label: '⚡ Tecnomoda · Sponsoreos',    desc: 'Convocatoria de sponsors · 3 emails escalando hasta deadline 01/07',     color: '#0050c3', icon: 'sparkles',   priority: 3, items: [] },
          'certif':      { label: '📜 Certificaciones',         desc: 'Recordatorios de renovación de certificación pre-18/3',                  color: '#b45309', icon: 'badge-check',priority: 4, items: [] },
          'pilares':     { label: '📚 Pilares regulares',        desc: 'Cadencia editorial: tips de viernes · adopción · operativo · enablement',color: '#475569', icon: 'layers',     priority: 5, items: [] },
        };
        comms.forEach(c => {
          const t = ((c.tag||'') + ' ' + (c.titulo||'') + ' ' + (c.pilar||'')).toUpperCase();
          if (/PRODE|MUNDIAL|ARGELIA|AUSTRIA|JORDANIA|PLAYOFFS|RANKING|PRE PARTIDO|KICKOFF/.test(t)) groups.prode.items.push(c);
          else if (/PRODUCT DIGEST|LUMI|LANZAMIENTO/.test(t)) groups.lanzamiento.items.push(c);
          else if (/TECNOMODA|SPONSOR/.test(t)) groups.tecnomoda.items.push(c);
          else if (/CERTIFIC/.test(t)) groups.certif.items.push(c);
          else groups.pilares.items.push(c);
        });
        // Quitar grupos vacíos y ordenar items por fecha
        return Object.values(groups)
          .filter(g => g.items.length)
          .map(g => ({...g, items: g.items.sort((a,b) => (a.fecha||'').localeCompare(b.fecha||''))}));
      }

      function renderStrategyOverviewView(monthKey, comms) {
        const monthLabel = new Date(monthKey+'-01T12:00:00').toLocaleDateString('es-AR',{month:'long',year:'numeric'});

        // ============ STATS HERO ============
        const emailCount = comms.filter(c => (c.canales||[]).includes('Email')).length;
        const whatsappCount = comms.filter(c => (c.canales||[]).includes('WhatsApp')).length;
        const programados = comms.filter(c => statusOf(c) === 'programado').length;
        const finalizados = comms.filter(c => statusOf(c) === 'finalizado').length;
        const pendientes = comms.filter(c => statusOf(c) === 'pendiente').length;
        const todayKey = today.toISOString().slice(0,10);
        const atrasadas = comms.filter(c => c.fecha && c.fecha < todayKey && statusOf(c) !== 'finalizado').length;
        const sinCopy = comms.filter(c => !c.copy && !c.contenido).length;

        const heroStat = (label, val, sub, color, icon) => `
          <div class="bg-white rounded-xl border border-[#e4e4e7] p-4 flex flex-col">
            <div class="flex items-center gap-2 mb-2">
              <div class="w-7 h-7 rounded-md flex items-center justify-center" style="background:${color}15;color:${color}">${ic(icon,'w-4 h-4')}</div>
              <span class="text-[10px] uppercase tracking-wider font-semibold text-[var(--mid-grey)]">${label}</span>
            </div>
            <div class="text-3xl font-extrabold h-heading leading-none">${val}</div>
            <div class="text-xs text-[var(--mid-grey)] mt-1">${sub}</div>
          </div>
        `;
        const statsHero = `
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
            ${heroStat('Total del mes', comms.length, monthLabel, '#0050c3', 'send')}
            ${heroStat('Canales', `${emailCount}/${whatsappCount}`, 'Email / WhatsApp', '#9333ea', 'split')}
            ${heroStat('Programado', `${programados}/${comms.length}`, `${finalizados} ya enviadas`, '#16a34a', 'check-circle-2')}
            ${heroStat('Atención', `${atrasadas + sinCopy}`, `${atrasadas} atrasadas · ${sinCopy} sin copy`, atrasadas+sinCopy ? '#ef4444' : '#9ca3af', 'alert-triangle')}
          </div>
        `;

        // ============ BLOQUES TEMÁTICOS ============
        const themes = groupCommsByTheme(comms);
        const themesHTML = themes.map(g => {
          const fechas = g.items.map(i => i.fecha).filter(Boolean).sort();
          const rango = fechas.length ? `${new Date(fechas[0]+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short'})} → ${new Date(fechas[fechas.length-1]+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short'})}` : 'Sin fechas';
          const channels = [...new Set(g.items.flatMap(i => i.canales||[]))].join(' · ');

          return `
            <div class="bg-white rounded-2xl border border-[#e4e4e7] overflow-hidden mb-4">
              <div class="px-5 py-4 flex items-center gap-3 flex-wrap" style="background: linear-gradient(90deg, ${g.color}08 0%, transparent 60%); border-bottom: 1px solid #e4e4e7;">
                <div class="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style="background:${g.color}15;color:${g.color}">${ic(g.icon,'w-5 h-5')}</div>
                <div class="flex-1 min-w-0">
                  <h3 class="font-bold h-heading">${g.label}</h3>
                  <p class="text-xs text-[var(--mid-grey)]">${g.desc}</p>
                </div>
                <div class="text-right shrink-0">
                  <div class="text-lg font-extrabold h-heading">${g.items.length}</div>
                  <div class="text-[10px] uppercase tracking-wider text-[var(--mid-grey)] font-semibold">comm${g.items.length===1?'':'s'}</div>
                </div>
              </div>

      function buildMonthText(comms, monthKey) {
        const monthName = new Date(monthKey+'-01T12:00:00').toLocaleDateString('es-AR',{month:'long',year:'numeric'});
        let txt = `ESTRATEGIA DE COMUNICACIONES · ${monthName.toUpperCase()}\n`;

        txt += `Total: ${comms.length} comunicaciones\n`;
        txt += `${'='.repeat(70)}\n\n`;
        comms.forEach((it, i) => {
          const cat = CATEGORIES[it.categoria]?.label || it.categoria;
          const st = STATUSES[statusOf(it)].label;
          txt += `[${i+1}/${comms.length}] ${fmtDateLong(it.fecha).toUpperCase()}\n`;
          txt += `Categoría: ${cat} · Status: ${st} · Audiencia: ${(it.audiencia||[]).join(', ')}\n`;
          txt += `Título: ${it.titulo}\n`;
          if (it.pilar) txt += `Pilar: ${it.pilar}\n`;
          if (it.owners?.length) txt += `Owners: ${it.owners.join(', ')}\n`;
          if (it.copy) txt += `\nCOPY:\n${it.copy}\n`;
          else if (it.contenido) txt += `\nDescripción: ${it.contenido}\n`;
          if (it.links?.length) {
            txt += `\nLinks:\n`;
            it.links.forEach(l => { txt += `· ${l.label}: ${l.url||'#'}\n`; });
          }
          txt += `\n${'-'.repeat(70)}\n\n`;
        });
        return txt;

      function bulkParse() {
        const text = document.getElementById('bulk-text').value;

      function parseTextToItems(text) {
        const lines = text.split(/\n+/).map(l => l.trim()).filter(Boolean);
        const items = [];
        const dateRegex = /(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?/;
        const year = 2026;
        lines.forEach(line => {
          const m = line.match(dateRegex);
          if (!m) return;
          const day = parseInt(m[1]), mon = parseInt(m[2]);
          if (isNaN(day)||isNaN(mon)||day>31||mon>12) return;
          const dateStr = `${year}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const rest = line.replace(dateRegex,'').replace(/^[\s\-•·]+/,'').trim();

          // categoria heuristics
          let categoria = 'webinar', tipo = 'accion';
          const lo = rest.toLowerCase();
          if (/whatsapp|wpp|wsp/.test(lo)) { categoria='whatsapp'; tipo='comunicacion'; }
          else if (/newsletter/.test(lo))   { categoria='newsletter'; tipo='comunicacion'; }
          else if (/comunidad|comunidad/.test(lo)) { categoria='comunidad'; tipo='comunicacion'; }
          else if (/^email|^mail|^comm|enviar|envío|envio/.test(lo))   { categoria='email'; tipo='comunicacion'; }
          else if (/webinar/.test(lo))      { categoria='webinar'; tipo='accion'; }
          else if (/pocket|brunch/.test(lo))    { categoria='pocket_event'; tipo='accion'; }
          else if (/evento|kick-off|kickoff|cena/.test(lo)) { categoria='big_event'; tipo='accion'; }
          else if (/caso de éxito|business case|success/.test(lo)) { categoria='business_case'; tipo='accion'; }
          else if (/ugc/.test(lo))          { categoria='ugc'; tipo='accion'; }
          else if (/key ?city|workshop córdoba|córdoba|rosario|mendoza/.test(lo)) { categoria='key_city'; tipo='accion'; }
          else if (/sponsor/.test(lo))      { categoria='sponsorship'; tipo='accion'; }

          // audiencia
          const audiencia = [];
          if (/agenc/i.test(line)) audiencia.push('Agencies');
          if (/merchant/i.test(line)) audiencia.push('Merchants');
          if (/partner/i.test(line) && !audiencia.includes('Partners')) audiencia.push('Partners');
          if (!audiencia.length) audiencia.push('Partners');

          // priority
          const pm = line.match(/\bP[123]\b/i);
          const prioridad = pm ? pm[0].toUpperCase() : '';

          // titulo
          const tituloMatch = rest.match(/:(.+)$/);
          const titulo = (tituloMatch ? tituloMatch[1] : rest).trim().replace(/^[a-záéíóú]+\s+/i,'').slice(0,120) || rest.slice(0,120);
          const contenido = rest;

          items.push({
            id: 'parsed-' + slug(),
            tipo, categoria, titulo, fecha: dateStr,
            audiencia, canales: [], status: 'programado',
            prioridad, owners: [], contenido,
            cluster: 'ALL', _source_section: 'bulk_upload',
          });
        });
        return items;
      }

        const keep = items.filter((_, i) => checks[i] && checks[i].checked);

        renderAll();
        toast(`✨ Sumé ${keep.length} items al hub`);

        const csv = document.getElementById('bulk-csv').value.trim();
        if (!csv) { toast('⚠️ Pegá CSV o subí un archivo primero'); return; }
        const rows = csv.split(/\n+/);
        const header = rows.shift().split(',').map(s=>s.trim());
        const items = rows.map(r => {
          const cols = r.split(',').map(s=>s.trim());
          const obj = {}; header.forEach((h,i) => obj[h] = cols[i] || '');
          return {
            id: 'csv-' + slug(),
            tipo: obj.tipo, categoria: obj.categoria, titulo: obj.titulo,
            fecha: obj.fecha, audiencia: obj.audiencia ? [obj.audiencia] : [],
            canales: obj.canales ? [obj.canales] : [], status: obj.status,
            prioridad: obj.prioridad, owners: obj.owners ? [obj.owners] : [],
            contenido: obj.contenido, _source_section: 'csv_upload',
          };
        });
        const preview = document.getElementById('bulk-preview');
        preview.innerHTML = `<div class="mt-4">
          <h4 class="font-bold h-heading mb-3">📋 Procesé ${items.length} filas</h4>
          <div class="max-h-72 overflow-y-auto scroll-v space-y-2 mb-4 border border-[var(--lightest-grey)] rounded-xl p-3">

      // ============== AI VIEW ==============
      function generateDynamicSuggestions() {
        // Examina el estado actual del calendario y propone preguntas relevantes
        const suggestions = [];
        const items = state.items;
        const benefits = state.benefits;
        const todayKey = today.toISOString().slice(0,10);
        const nextMonthKey = new Date(today.getFullYear(), today.getMonth()+1, 1).toISOString().slice(0,7);

        // Items sin copy
        const sinCopy = items.filter(it => it.tipo==='comunicacion' && !it.copy && it.fecha && it.fecha >= todayKey);
        if (sinCopy.length) {
          suggestions.push({ q: `Generame copy para "${sinCopy[0].titulo.slice(0,50)}"`, a: 'aiAnswerCopy' });
        }

        // Slots libres en próximo mes
        const nextMonthCount = items.filter(it => it.fecha && it.fecha.startsWith(nextMonthKey)).length;
        if (nextMonthCount < 8) {
          suggestions.push({ q: `¿Qué huecos tengo en ${new Date(nextMonthKey+'-01').toLocaleDateString('es-AR',{month:'long'})}?`, a: 'aiAnswerSlots' });
        }

        // Beneficios sin link a métricas (ya publicados o medidos)
        const benSinMetricas = benefits.filter(b => (b.etapa==='publicado' || b.etapa==='medido') && !b.link_metricas);
        if (benSinMetricas.length) {
          suggestions.push({ q: `${benSinMetricas.length} beneficios sin link a métricas — ¿cuáles son?`, a: 'aiAnswerNoMetrics' });
        }

        // Conflictos de comms
        const upcoming = items.filter(it => it.tipo==='comunicacion' && it.fecha && it.fecha >= todayKey);
        if (upcoming.length > 3) {
          suggestions.push({ q: '¿Hay conflictos en las próximas 2 semanas?', a: 'aiAnswerConflicts' });
        }

        // Resumen del mes
        suggestions.push({ q: 'Resumime qué va a pasar este mes', a: 'aiAnswerNext' });

        // Items atrasados
        const atrasados = items.filter(it => it.fecha && it.fecha < todayKey && statusOf(it)!=='finalizado');
        if (atrasados.length) {
          suggestions.push({ q: `Tengo ${atrasados.length} items atrasados, ayudame a priorizar`, a: 'aiAnswerLate' });
        }

        // Conteo de comms del mes
        suggestions.push({ q: '¿Cuántas comms a partners van este mes?', a: 'aiAnswerCount' });

        return suggestions.slice(0, 5); // máximo 5 sugerencias visibles
      }

      function aiAnswerConflicts() {
        const todayKey = today.toISOString().slice(0,10);
        const limit = new Date(today.getTime() + 14*24*3600*1000).toISOString().slice(0,10);
        const upcoming = state.items.filter(it => it.tipo==='comunicacion' && it.fecha && it.fecha >= todayKey && it.fecha <= limit);
        const weeksMap = {};
        upcoming.forEach(it => {
          const wk = Math.floor(new Date(it.fecha+'T12:00:00').getTime()/(7*24*3600*1000));
          (it.audiencia||[]).forEach(a => {
            const key = wk+'|'+a;
            (weeksMap[key]||=[]).push(it);
          });
        });
        const conflicts = Object.entries(weeksMap).filter(([_,l]) => l.length >= 2);
        if (!conflicts.length) return `Revisé las próximas 2 semanas — <strong>sin conflictos</strong> de audiencia ✨`;
        return `Detecté <strong>${conflicts.length} solapes</strong> en las próximas 2 semanas:<div class="ai-suggestion">${conflicts.map(([k,l]) => `· Audiencia <strong>${k.split('|')[1]}</strong>: ${l.length} comms en la misma semana → ${l.map(x=>fmtDate(x.fecha)+' '+x.titulo.slice(0,30)).join(' · ')}`).join('<br>')}</div>Sugerencia: separar al menos 5 días entre comms a la misma audiencia.`;
      }

      }
      function generateAIResponse(q) {
        q = q.toLowerCase();
        if (q.includes('slot') || q.includes('libre') || q.includes('hueco')) return aiAnswerSlots();
        if (q.includes('copy') || q.includes('whatsapp') || q.includes('redactar') || q.includes('draft')) return aiAnswerCopy();
        if (q.includes('cuant') || q.includes('count') || q.includes('cantidad')) return aiAnswerCount();
        if (q.includes('próx') || q.includes('prox') || q.includes('siguiente') || q.includes('junio')) return aiAnswerNext();

        return `Buena pregunta. Probá <strong>Insights</strong> para el resumen ejecutivo + slots libres, o <strong>Estrategias</strong> para ver el canvas mensual de comms.`;

      function changeStatus(id, s) {
        const it = state.items.find(x => x.id===id); if (!it) return;

      }

      // ============== SMART CONTEXTUAL IA ACTIONS ==============
      function detectSmartActions(it) {
        const acts = [];
        const st = statusOf(it);
        const hasBriefLink = (it.links||[]).some(l => /brief|guion|timeline/i.test(l.label||''));
        const hasHubspot   = (it.links||[]).some(l => /hubspot/i.test((l.url||'') + (l.label||'')));
        const todayMs = new Date(today).getTime();
        const itDate = it.fecha ? new Date(it.fecha+'T12:00:00').getTime() : null;
        const isSoon = itDate && (itDate - todayMs) > 0 && (itDate - todayMs) < 5*24*3600*1000;
        const isPast = itDate && itDate < todayMs;
        const isComm = it.tipo === 'comunicacion';
        const isAccion = it.tipo === 'accion';

        // 1) Comunicación programada/pendiente sin copy → Generar copy
        if (isComm && !it.copy && st !== 'finalizado') {
          acts.push({
            icon: 'message-square', label: 'Generar copy',
            why: 'No tiene copy cargado y es una comunicación pendiente.',
            fn: `aiGenCopy('${it.id}')`,
          });
        }
        // 2) Acción con link a brief pero sin descripción → tomar del brief
        if (isAccion && hasBriefLink && !it.contenido) {
          acts.push({
            icon: 'file-text', label: 'Generar descripción desde el brief',
            why: 'Tiene link a brief pero falta la descripción del evento.',
            fn: `aiFromBrief('${it.id}')`,
          });
        }
        // 3) Comm próxima (< 5 días) sin recordatorio WhatsApp asociado
        if (isComm && isSoon && it.categoria === 'email') {
          const hasReminder = state.items.some(x => x.tipo==='comunicacion' && x.categoria==='whatsapp' && x.fecha && Math.abs(new Date(x.fecha+'T12:00:00').getTime() - itDate) < 3*24*3600*1000 && (x.audiencia||[]).some(a => (it.audiencia||[]).includes(a)));
          if (!hasReminder) {
            acts.push({
              icon: 'bell', label: 'Crear recordatorio WhatsApp',
              why: 'Sale en menos de 5 días y no detecté un WhatsApp de recordatorio.',
              fn: `aiCreateReminder('${it.id}')`,
            });
          }
        }
        // 4) Acción finalizada sin KPIs → sumar resultados
        if (st === 'finalizado' && !it.kpis && (it.tipo==='accion' || isComm)) {
          acts.push({
            icon: 'bar-chart-3', label: 'Sumar resultados / KPIs',
            why: 'Está finalizada pero faltan los KPIs medidos.',
            fn: `aiAskKpis('${it.id}')`,
          });
        }
        // 5) Sin fecha → sugerir fecha óptima
        if (!it.fecha) {
          acts.push({
            icon: 'calendar-plus', label: 'Sugerir fecha óptima',
            why: 'Ítem sin fecha (TBD). Asistente AI propone fecha basada en huecos y audiencia.',
            fn: `aiSuggestDate('${it.id}')`,
          });
        }
        // 6) Comm sin audiencia
        if (isComm && (!it.audiencia || it.audiencia.length===0)) {
          acts.push({
            icon: 'users', label: 'Sugerir audiencia',
            why: 'Comunicación sin audiencia asignada.',
            fn: `aiSuggestAudience('${it.id}')`,
          });
        }
        // 7) Business case sin copy de LinkedIn
        if (it.categoria === 'business_case' && !it.copy) {
          acts.push({
            icon: 'linkedin', label: 'Generar carrusel LinkedIn',
            why: 'Caso de éxito ideal para amplificar en LinkedIn.',
            fn: `aiLinkedInPost('${it.id}')`,
          });
        }
        // 8) Tiene copy en email → adaptar a WhatsApp
        if (it.copy && it.categoria === 'email') {
          acts.push({
            icon: 'message-circle', label: 'Adaptar copy a WhatsApp',
            why: 'Tiene copy de email. Asistente AI lo acorta y adapta al tono WhatsApp.',
            fn: `aiAdaptToWpp('${it.id}')`,
          });
        }
        // 9) Webinar/Big event finalizado sin business case → proponer caso
        if (isAccion && st==='finalizado' && ['webinar','big_event','pocket_event'].includes(it.categoria)) {
          acts.push({
            icon: 'trophy', label: 'Proponer business case de seguimiento',
            why: 'Evento ejecutado: buen momento para capitalizarlo en un caso.',
            fn: `aiProposeCase('${it.id}')`,
          });
        }
        // 10) Comment con TBD detectado → ofrecer cerrarlo
        if (/tbd|por confirmar|pending/i.test((it.comentarios||'') + (it.titulo||''))) {
          acts.push({
            icon: 'check-square', label: 'Cerrar los TBD pendientes',
            why: 'Hay items "TBD" en los comentarios o título.',
            fn: `aiResolveTBD('${it.id}')`,
          });
        }
        // 11) Tiene HubSpot link sin métricas guardadas
        if (hasHubspot && !it.kpis && st === 'finalizado') {
          acts.push({
            icon: 'trending-up', label: 'Importar métricas de HubSpot',
            why: 'Tiene link a HubSpot. Asistente AI puede pedir las métricas de envío.',
            fn: `aiImportHubspot('${it.id}')`,
          });
        }
        return acts;
      }

      function renderSmartActions(it) {
        if (!isAdmin()) return ''; // Sólo admin
        const acts = detectSmartActions(it);

            it.copy = `📬 ${it.titulo}\n\nHola, partner!\nEste mes te traemos:\n\n· Recap del Hot Sale\n· Nuevos beneficios del programa\n· Próximo webinar (registrate acá)\n\n¡Buen mes! ✨`;

      function aiAskKpis(id) {
        const it = state.items.find(x => x.id===id); if (!it) return;
        const sample = {
          asistentes: prompt('Asistentes / registros (número)', ''),
          open: prompt('Open rate % (si aplica)', ''),
          ctr: prompt('CTR % (si aplica)', ''),
        };
        it.kpis = {};
        Object.entries(sample).forEach(([k,v]) => { if (v) it.kpis[k] = isNaN(+v)?v:+v; });
        closeAllDrawers(); renderAll(); openDetail(id);
        toast('📊 KPIs guardados');
      }
      function aiSuggestDate(id) {
        const it = state.items.find(x => x.id===id); if (!it) return;
        // Find a slot in the next 30 days with low load
        const counts = {};
        state.items.forEach(x => { if (x.fecha) counts[x.fecha] = (counts[x.fecha]||0)+1; });
        let best = null, bestScore = Infinity;
        for (let d=1; d<=30; d++) {
          const dt = new Date(today); dt.setDate(dt.getDate()+d);
          const k = dt.toISOString().slice(0,10);
          const c = counts[k] || 0;
          if (c < bestScore && dt.getDay() !== 0 && dt.getDay() !== 6) { best = k; bestScore = c; }
          if (c === 0) break;
        }
        if (best && confirm(`El asistente sugiere ${fmtDateLong(best)} (${bestScore} items ese día). ¿Aplicar?`)) {
          it.fecha = best; closeAllDrawers(); renderAll(); openDetail(id);
          toast(`📅 Fecha asignada: ${fmtDate(best)}`);
        }
      }

      function aiAutocomplete() {

          else if (titulo.includes('córdoba') || titulo.includes('cordoba') || titulo.includes('rosario')) { cat='key_city'; tag='KEYCITY'; aud=['Merchants','Agencies']; desc='Activación presencial en ciudad estratégica.'; }

      function saveNew(e, editId) {

        const data = {
          tipo: fd.get('tipo'), categoria: fd.get('categoria'),

          comentarios: fd.get('comentarios') || '',
          links: fd.get('link') ? [{label:'Link', url:fd.get('link')}] : [],

      function deleteItem(id, fromDrawer) {

      function copyFullItem(id) {

        txt += `${'-'.repeat(it.titulo.length)}\n`;
        txt += `Categoría: ${CATEGORIES[it.categoria]?.label||it.categoria}\n`;
        if (it.fecha) txt += `Fecha: ${fmtDateLong(it.fecha)}\n`;
        if (it.audiencia?.length) txt += `Audiencia: ${it.audiencia.join(', ')}\n`;
        if (it.canales?.length) txt += `Canales: ${it.canales.join(', ')}\n`;
        if (it.pilar) txt += `Pilar: ${it.pilar}\n`;
        txt += `Status: ${STATUSES[statusOf(it)].label}\n`;

        if (it.copy) txt += `\nCopy:\n${it.copy}\n`;
        if (it.links?.length) txt += `\nLinks:\n` + it.links.map(l => `· ${l.label}: ${l.url||'#'}`).join('\n') + '\n';
        if (it.comentarios) txt += `\nComentarios:\n${it.comentarios}\n`;

      // ============== BENEFITS VIEW ==============
      function renderBenefits() {
        const monthKey = state.stratMonth;
        const cursorM = new Date(monthKey + '-01T12:00:00');
        const monthName = cursorM.toLocaleDateString('es-AR',{month:'long',year:'numeric'});

        // Capacity widgets — usa caps configurables

          const cap = state.benefit_caps[k] || { value: 1, period: 'mensual' };

          const used = countBenefitsInPeriod(k, monthKey);
          const isUnlimited = cap.period === 'sin_limite';
          const pct = isUnlimited ? 0 : Math.min(100, (used/cap.value)*100);
          const full = !isUnlimited && used >= cap.value;
          return `
            <div class="cap-card">
              <div class="flex items-start gap-2 mb-1">
                <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style="background:${v.color}15;color:${v.color}">${ic(v.icon,'w-4 h-4')}</div>

      function openCapsConfig() {

        const modal = document.getElementById('lib-modal');

          const cap = state.benefit_caps[k] || { value: 1, period: 'mensual' };
          return `

      function saveCaps() {

      function setBenefitStage(id, stageId) {
        const b = state.benefits.find(x => x.id === id);
        if (!b) return;
        b.etapa = stageId;
        if (stageId === 'publicado' && !b.fecha_publicado && b.fecha_objetivo) b.fecha_publicado = b.fecha_objetivo;
        renderAll();
        openBenefitDetail(id);
        toast(`✅ Etapa: ${BENEFIT_STAGES.find(s=>s.id===stageId).label}`);
      }
      function advanceBenefitStage(id) {
        const b = state.benefits.find(x => x.id === id);
        if (!b) return;
        const idx = BENEFIT_STAGES.findIndex(s => s.id === b.etapa);
        if (idx < BENEFIT_STAGES.length - 1) setBenefitStage(id, BENEFIT_STAGES[idx+1].id);
      }
      function deleteBenefit(id) {
        const b = state.benefits.find(x => x.id === id);
        if (!b) return;
        if (!confirm(`¿Eliminar el slot de "${b.agencia}"?`)) return;
        state.benefits = state.benefits.filter(x => x.id !== id);
        closeAllDrawers();
        renderAll();
        toast('🗑️ Eliminado');
      }
      function askBenefitMetrics(id) {
        const b = state.benefits.find(x => x.id === id);
        if (!b) return;
        if (b.tipo_beneficio.startsWith('ugc')) {
          const alcance = prompt('Alcance del post (TN reporta)', '');
          const interaccion = prompt('% Interacción', '');
          const reproducciones = prompt('Reproducciones', '');
          const dms = prompt('DMs recibidos (vos reportás)', '');
          const leads = prompt('Leads convertidos', '');
          b.metricas_contenido = b.metricas_contenido || {};
          b.metricas_conversion = b.metricas_conversion || {};
          if (alcance) b.metricas_contenido.alcance = +alcance;
          if (interaccion) b.metricas_contenido.interaccion = +interaccion;
          if (reproducciones) b.metricas_contenido.reproducciones = +reproducciones;
          if (dms) b.metricas_conversion.dms_recibidos = +dms;
          if (leads) b.metricas_conversion.leads = +leads;
        } else {
          const asistentes = prompt('Asistentes', '');
          const leads = prompt('Leads del evento', '');
          b.metricas_contenido = b.metricas_contenido || {};
          if (asistentes) b.metricas_contenido.asistentes = +asistentes;
          if (leads) b.metricas_contenido.leads_evento = +leads;
        }
        renderAll();
        openBenefitDetail(id);
        toast('📊 Métricas guardadas');

      function toggleBenefitFields(t) {
        const isUGC = t && t.startsWith('ugc');
        const isAV  = t === 'success_story_av';
        const needsVenue = ['pocket_event','evento_oficina'].includes(t);
        const ugc = document.getElementById('ben-ugc-fields');
        const av  = document.getElementById('ben-av-fields');
        const ven = document.getElementById('ben-venue-fields');
        if (ugc) ugc.style.display = isUGC ? '' : 'none';
        if (av)  av.style.display  = isAV  ? '' : 'none';
        if (ven) ven.style.display = needsVenue ? '' : 'none';
      }
      function saveBenefit(e, editId) {
        e.preventDefault();
        const fd = new FormData(e.target);
        const data = {
          tipo_beneficio: fd.get('tipo_beneficio'),
          agencia: fd.get('agencia'),
          tier_agencia: fd.get('tier_agencia'),
          fecha_objetivo: fd.get('fecha_objetivo') || null,
          etapa: fd.get('etapa') || 'idea',
          formato: fd.get('formato') || '',
          formato_av: fd.get('formato_av') || '',
          pilar: fd.get('pilar') || '',
          headline: fd.get('headline') || '',
          venue: fd.get('venue') || '',
          num_invitados: fd.get('num_invitados') ? +fd.get('num_invitados') : null,
          owner_tn: fd.get('owner_tn') || '',
          owner_agencia: fd.get('owner_agencia') || '',
          brief_link: fd.get('brief_link') || '',
          link_metricas: fd.get('link_metricas') || '',
          notas: fd.get('notas') || '',
        };
        if (editId) {
          const b = state.benefits.find(x => x.id === editId);
          if (b) Object.assign(b, data);
          closeAllDrawers(); renderAll(); openBenefitDetail(editId);
          toast(`✏️ Slot actualizado · ${data.agencia}`);
        } else {
          data.id = 'ben-' + slug();
          state.benefits.push(data);
          closeAllDrawers(); renderAll();
          toast(`✅ Nuevo slot · ${data.agencia}`);
          setTimeout(() => openBenefitDetail(data.id), 300);
        }
      }

      // ============== ROUTING ==============
      function setView(v) {
        state.view = v;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === v));
        document.getElementById('view-title').textContent = ({
          calendar: 'Calendario',
          strategy: 'Estrategia del mes',
          benefits: 'Beneficios para Agencias',
          ai: 'Asistente AI',
          insights: 'Insights & Resumen',
          library: 'Biblioteca de templates',
        })[v] || 'Hub';
        renderAll();
      }
      document.querySelectorAll('.nav-item').forEach(n => { n.addEventListener('click', () => setView(n.dataset.view)); });

      function renderAll() {
        renderFilters();
        const c = document.getElementById('content');
        if (state.view === 'calendar') c.innerHTML = renderCalendar();
        else if (state.view === 'strategy') c.innerHTML = renderStrategy();
        else if (state.view === 'benefits') c.innerHTML = renderBenefits();
        else if (state.view === 'ai') c.innerHTML = renderAI();
        else if (state.view === 'insights') c.innerHTML = renderInsights();
        else if (state.view === 'library') c.innerHTML = renderLibrary();
        if (window.lucide) lucide.createIcons();
      }

      // First-load welcome
      applyRole();
      if (!state.role) {
        // Set admin as default for filling render but show modal
        state.role = 'admin';
        applyRole();
        setTimeout(() => showWelcome(), 250);
      }

      renderAll();
      if (window.lucide) lucide.createIcons();
    </script>
  </body>
</html>
