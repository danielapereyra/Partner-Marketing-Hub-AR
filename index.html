<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Partner Marketing Hub · Tiendanube ARG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
      :root {
        --nimbus-blue: #0050c3;
        --nimbus-blue-700: #00298f;
        --dark-blue: #171e43;
        --space-black: #010b23;
        --light-blue: #bcdfFd;
        --clear-blue: #deefFe;
        --clear-blue-bg: #f5faff;
        --light-grey-bg: #f7f7f7;
        --lightest-grey: #e7e8e9;
        --light-grey: #a0a3a6;
        --mid-grey: #8a8d90;
        --text-dark: #343537;
        --success: #0ca76b;
        --partners: #ff8f8f;
        --apps: #953e91;
        --layouts: #ffb438;
        --wallet: #ef297a;
        --whatsapp: #43d854;

        /* Status semaforo */
        --st-pendiente: #ef4444;
        --st-pendiente-bg: #fee2e2;
        --st-programado: #eab308;
        --st-programado-bg: #fef9c3;
        --st-finalizado: #16a34a;
        --st-finalizado-bg: #dcfce7;
        --st-on_hold: #f97316;
        --st-on_hold-bg: #ffedd5;
      }
      html,
      body {
        font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Helvetica Neue", arial, sans-serif;
        color: var(--text-dark);
        background: #fafafa;
        min-height: 100vh;
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .h-heading { color: var(--dark-blue); letter-spacing: -0.015em; font-weight: 700; }
      .card-shadow {
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04), 0 1px 3px rgba(16, 24, 40, 0.04);
        border: 1px solid #ebebed;
      }
      .btn {
        display: inline-flex; align-items: center; gap: 6px;
        font-weight: 600; font-size: 13px; line-height: 1;
        padding: 9px 16px; border-radius: 8px;
        transition: all 0.12s ease;
        white-space: nowrap; cursor: pointer;
        border: 1px solid transparent;
      }
      .btn-primary { background: var(--nimbus-blue); color: #fff; box-shadow: 0 1px 2px rgba(0,80,195,0.2); }
      .btn-primary:hover { background: var(--nimbus-blue-700); box-shadow: 0 2px 4px rgba(0,80,195,0.3); }
      .btn-secondary { background: #fff; color: var(--dark-blue); border-color: #e4e4e7; }
      .btn-secondary:hover { border-color: var(--dark-blue); background: #fafafa; }
      .btn-ghost { background: transparent; color: var(--mid-grey); }
      .btn-ghost:hover { background: #f4f4f5; color: var(--dark-blue); }
      .btn-sm { padding: 7px 12px; font-size: 12px; }
      .btn-xs { padding: 4px 10px; font-size: 11px; border-radius: 6px; }

      .chip {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 6px 11px; border-radius: 6px;
        font-size: 12px; font-weight: 500; line-height: 1;
        border: 1px solid transparent; cursor: pointer;
        transition: all 0.12s ease; white-space: nowrap;
      }
      .chip-off { background: #fff; color: var(--text-dark); border-color: #e4e4e7; }
      .chip-off:hover { border-color: var(--dark-blue); background: #fafafa; }
      .chip-on { background: var(--dark-blue); color: #fff; border-color: var(--dark-blue); font-weight: 600; }
      .pill {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 3px 8px; border-radius: 6px;
        font-size: 11px; font-weight: 600; line-height: 1.3;
      }
      /* Category colors — palette más muted y profesional */
      .cat-webinar       { background: #f5f3ff; color: #6d28d9; }
      .cat-pocket_event  { background: #fef7ed; color: #c2410c; }
      .cat-big_event     { background: #fef2f2; color: #b91c1c; }
      .cat-business_case { background: #f0fdf4; color: #15803d; }
      .cat-ugc           { background: #fdf2f8; color: #be185d; }
      .cat-social_media  { background: #f0f9ff; color: #0369a1; }
      .cat-key_city      { background: #fffbeb; color: #b45309; }
      .cat-sponsorship   { background: #f5f3ff; color: #6d28d9; }
      .cat-email         { background: #eff6ff; color: #1d4ed8; }
      .cat-whatsapp      { background: #f0fdf4; color: #15803d; }
      .cat-comunidad     { background: #ecfeff; color: #0e7490; }
      .cat-newsletter    { background: #eef2ff; color: #4338ca; }
      .cat-milestone     { background: #fffbeb; color: #b45309; }
      .cat-sponsoreo     { background: #faf5ff; color: #7c3aed; }
      .cat-other         { background: #f4f4f5; color: #52525b; }

      /* Status pills */
      .status-pendiente { background: #fef2f2; color: #b91c1c; }
      .status-programado { background: #fffbeb; color: #b45309; }
      .status-finalizado { background: #f0fdf4; color: #15803d; }
      .status-on_hold { background: #fff7ed; color: #c2410c; }

      .priority-P1 { background: #fee2e2; color: #b91c1c; }
      .priority-P2 { background: #fef3c7; color: #92400e; }
      .priority-P3 { background: #e0e7ff; color: #3730a3; }

      /* Status dot for calendar chips */
      .st-dot {
        width: 8px; height: 8px; border-radius: 100px;
        flex-shrink: 0; display: inline-block;
        border: 1.5px solid #fff;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
      }
      .st-dot.pendiente { background: var(--st-pendiente); }
      .st-dot.programado { background: var(--st-programado); }
      .st-dot.finalizado { background: var(--st-finalizado); }
      .st-dot.on_hold { background: var(--st-on_hold); }

      .input, .select, .textarea {
        width: 100%; padding: 9px 12px;
        border: 1px solid #e4e4e7;
        border-radius: 8px; background: #fff;
        font-size: 13px; font-family: inherit; color: var(--text-dark);
        transition: border 0.12s, box-shadow 0.12s;
      }
      .input:focus, .select:focus, .textarea:focus {
        outline: none; border-color: var(--nimbus-blue);
        box-shadow: 0 0 0 3px rgba(0, 80, 195, 0.1);
      }
      .label {
        font-size: 11px; font-weight: 600; color: var(--mid-grey);
        text-transform: uppercase; letter-spacing: 0.04em;
        margin-bottom: 5px; display: block;
      }

      /* Calendar */
      .cal-grid {
        display: grid; grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 1px; background: #e4e4e7;
        border-radius: 10px; overflow: hidden; border: 1px solid #e4e4e7;
      }
      .cal-head {
        background: #fafafa; color: var(--mid-grey);
        padding: 10px 12px; font-size: 10px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.06em; text-align: left;
        border-bottom: 1px solid #e4e4e7;
      }
      .cal-cell {
        background: #fff; min-height: 130px;
        padding: 8px; position: relative;
        transition: background 0.12s; cursor: pointer;
      }
      .cal-cell:hover { background: var(--clear-blue-bg); }
      .cal-cell.other-month { background: #fafafb; }
      .cal-cell.other-month .cal-daynum { color: var(--light-grey); }
      .cal-cell.today {
        background: linear-gradient(180deg, #fff 0%, #f5faff 100%);
        outline: 2px solid var(--nimbus-blue); outline-offset: -2px; z-index: 2;
      }
      .cal-cell.today .cal-daynum { background: var(--nimbus-blue); color: #fff; }
      .cal-daynum {
        font-size: 12px; font-weight: 700; color: var(--dark-blue);
        width: 22px; height: 22px; display: inline-flex;
        align-items: center; justify-content: center;
        border-radius: 100px; margin-bottom: 4px;
      }
      .cal-event {
        display: flex; align-items: center; gap: 5px;
        padding: 3px 7px; border-radius: 5px;
        font-size: 11px; font-weight: 500;
        margin-bottom: 2px; cursor: pointer; line-height: 1.3;
        transition: filter 0.12s;
      }
      .cal-event:hover { filter: brightness(0.96); }
      .cal-event-title {
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
      }
      .cal-more {
        font-size: 10px; font-weight: 700; color: var(--mid-grey);
        margin-top: 2px; cursor: pointer; padding: 2px 6px;
        border-radius: 4px; background: var(--light-grey-bg);
        display: inline-block;
      }
      .cal-more:hover { color: var(--nimbus-blue); background: var(--clear-blue-bg); }

      /* Sidebar */
      .nav-item {
        display: flex; align-items: center; gap: 10px;
        padding: 9px 12px; border-radius: 8px;
        font-weight: 500; font-size: 13px; color: var(--text-dark);
        cursor: pointer; transition: all 0.12s;
      }
      .nav-item:hover { background: #f4f4f5; color: var(--dark-blue); }
      .nav-item.active { background: var(--dark-blue); color: #fff; font-weight: 600; }
      .nav-item .icon { width: 17px; height: 17px; }

      /* Segmented control (Tipo) */
      .seg {
        display: inline-flex; padding: 3px; background: #f4f4f5;
        border: 1px solid #e4e4e7; border-radius: 8px;
        gap: 2px;
      }
      .seg-btn {
        padding: 6px 14px; border-radius: 6px;
        font-size: 12px; font-weight: 500;
        cursor: pointer; transition: all 0.12s;
        display: inline-flex; align-items: center; gap: 6px;
        color: var(--mid-grey);
      }
      .seg-btn:hover { color: var(--dark-blue); }
      .seg-btn.active {
        background: #fff; color: var(--dark-blue);
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        font-weight: 600;
      }
      .seg-btn .count {
        font-size: 10px; padding: 1px 6px;
        background: rgba(0,0,0,0.06); border-radius: 4px; font-weight: 600;
      }
      .seg-btn.active .count { background: var(--clear-blue); color: var(--nimbus-blue); }

      /* Status filter pill */
      .st-filter {
        padding: 6px 14px 6px 10px;
        border-radius: 100px; border: 1.5px solid transparent;
        font-size: 12px; font-weight: 700; cursor: pointer;
        display: inline-flex; align-items: center; gap: 6px;
        transition: all 0.15s;
        background: #fff;
      }
      .st-filter .dot {
        width: 10px; height: 10px; border-radius: 100px;
      }
      .st-filter.pendiente .dot { background: var(--st-pendiente); }
      .st-filter.programado .dot { background: var(--st-programado); }
      .st-filter.finalizado .dot { background: var(--st-finalizado); }
      .st-filter.on_hold .dot { background: var(--st-on_hold); }
      .st-filter { border-color: var(--lightest-grey); color: var(--text-dark); }
      .st-filter:hover { border-color: var(--dark-blue); }
      .st-filter.active.pendiente   { background: var(--st-pendiente-bg);   border-color: var(--st-pendiente);   color: var(--st-pendiente); }
      .st-filter.active.programado  { background: var(--st-programado-bg);  border-color: var(--st-programado);  color: #854d0e; }
      .st-filter.active.finalizado  { background: var(--st-finalizado-bg);  border-color: var(--st-finalizado);  color: var(--st-finalizado); }
      .st-filter.active.on_hold     { background: var(--st-on_hold-bg);     border-color: var(--st-on_hold);     color: #9a3412; }

      /* Drawer / Modal */
      .drawer-backdrop {
        position: fixed; inset: 0;
        background: rgba(23, 30, 67, 0.45);
        backdrop-filter: blur(4px);
        z-index: 1050; opacity: 0;
        pointer-events: none; transition: opacity 0.25s ease;
      }
      .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
      .drawer {
        position: fixed; top: 0; right: 0; height: 100vh;
        width: min(580px, 100%); background: #fff;
        z-index: 1060; transform: translateX(100%);
        transition: transform 0.35s cubic-bezier(0.19, 1, 0.22, 1);
        display: flex; flex-direction: column;
        box-shadow: -24px 0 48px -12px rgba(23, 30, 67, 0.18);
      }
      .drawer.open { transform: translateX(0); }
      .drawer-lg { width: min(720px, 100%); }
      .drawer-xl { width: min(900px, 100%); }

      .modal-bd {
        position: fixed; inset: 0; z-index: 1060;
        display: none; align-items: center; justify-content: center;
        padding: 24px; background: rgba(23, 30, 67, 0.55); backdrop-filter: blur(6px);
      }
      .modal-bd.open { display: flex; }
      .modal-card {
        background: #fff; border-radius: 20px;
        max-width: 880px; width: 100%;
        max-height: 92vh; overflow: auto;
        box-shadow: 0 24px 48px -12px rgba(50, 50, 93, 0.25);
        animation: fadeUp 0.3s ease-out;
      }

      /* AI bubble */
      .ai-bubble-user { background: var(--dark-blue); color: #fff; align-self: flex-end; border-radius: 18px 18px 4px 18px; }
      .ai-bubble-ai { background: #fff; color: var(--text-dark); align-self: flex-start; border-radius: 18px 18px 18px 4px; border: 1px solid var(--lightest-grey); }
      .ai-bubble { padding: 12px 16px; font-size: 14px; max-width: 85%; line-height: 1.5; }
      .ai-bubble strong { color: var(--nimbus-blue); font-weight: 700; }
      .ai-bubble .ai-suggestion {
        margin-top: 10px; padding: 10px 12px;
        background: var(--clear-blue-bg);
        border-left: 3px solid var(--nimbus-blue);
        border-radius: 8px; font-size: 13px;
      }
      .shimmer {
        background: linear-gradient(90deg, #f0f1f5 0%, #f7f8fb 50%, #f0f1f5 100%);
        background-size: 200% 100%; animation: shimmer 1.4s ease-in-out infinite;
      }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      .ai-glow {
        background: linear-gradient(135deg, #0050c3 0%, #953e91 50%, #ef297a 100%);
        background-size: 200% 200%;
        animation: aiGlow 4s ease infinite;
      }
      @keyframes aiGlow { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
      .bar { height: 10px; border-radius: 100px; background: var(--lightest-grey); overflow: hidden; }
      .bar-fill { height: 100%; border-radius: 100px; }
      .scroll-h::-webkit-scrollbar { height: 6px; }
      .scroll-h::-webkit-scrollbar-thumb { background: var(--lightest-grey); border-radius: 100px; }
      .scroll-v::-webkit-scrollbar { width: 6px; }
      .scroll-v::-webkit-scrollbar-thumb { background: var(--lightest-grey); border-radius: 100px; }
      .truncate-2 {
        display: -webkit-box; -webkit-line-clamp: 2;
        -webkit-box-orient: vertical; overflow: hidden;
      }
      details > summary { list-style: none; cursor: pointer; }
      details > summary::-webkit-details-marker { display: none; }
      .rotate-on-open[open] .chev { transform: rotate(180deg); }
      .chev { transition: transform 0.2s; }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .fade-up { animation: fadeUp 0.3s ease-out; }

      /* Strategy view */
      .strat-row {
        display: grid; grid-template-columns: 80px 1fr 1fr 1fr;
        gap: 2px; background: var(--lightest-grey);
        border-bottom: 1px solid var(--lightest-grey);
      }
      .strat-day {
        background: #fff; padding: 10px 12px;
        border-right: 1px solid var(--lightest-grey);
      }
      .strat-day.today { background: #f5faff; border-left: 3px solid var(--nimbus-blue); }
      .strat-day.past { background: #fafafb; opacity: 0.85; }
      .strat-card {
        background: #fff; padding: 10px 12px;
        min-height: 70px; cursor: pointer; position: relative;
        transition: background 0.15s;
      }
      .strat-card:hover { background: var(--clear-blue-bg); }
      .strat-card.empty { background: repeating-linear-gradient(45deg, #fff, #fff 6px, #fafafb 6px, #fafafb 12px); }
      .strat-card.empty:hover { background: var(--clear-blue-bg); }
      .strat-card.late { background: #fff5f5; }

      /* Drop zone */
      .dz {
        border: 2px dashed var(--lightest-grey);
        border-radius: 16px; padding: 32px;
        text-align: center; transition: all 0.2s;
        cursor: pointer;
      }
      .dz:hover { border-color: var(--nimbus-blue); background: var(--clear-blue-bg); }
      .dz.over { border-color: var(--nimbus-blue); background: var(--clear-blue-bg); }

      /* Lib card */
      .lib-card {
        background: #fff; border-radius: 16px; padding: 18px;
        border: 1px solid var(--lightest-grey);
        transition: all 0.2s;
      }
      .lib-card:hover { border-color: var(--nimbus-blue); transform: translateY(-2px); box-shadow: 0 8px 24px -8px rgba(0,80,195,0.15); }

      /* Role card on welcome */
      .role-card {
        text-align: left; padding: 20px; border: 2px solid var(--lightest-grey);
        border-radius: 18px; background: #fff; cursor: pointer;
        transition: all 0.2s; display: block; width: 100%;
      }
      .role-card:hover { border-color: var(--nimbus-blue); background: var(--clear-blue-bg); transform: translateY(-2px); }
      .role-pill {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
        background: #eff6ff; color: var(--nimbus-blue);
        border: 1px solid #dbeafe; cursor: pointer;
        transition: all 0.12s;
      }
      .role-pill.viewer { background: #fffbeb; color: #b45309; border-color: #fef3c7; }
      .role-pill:hover { filter: brightness(0.96); }

      /* Week / Day view */
      .week-grid {
        display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 2px;
        background: var(--lightest-grey); border-radius: 16px; overflow: hidden;
        border: 1px solid var(--lightest-grey);
      }
      .week-col { background: #fff; min-height: 600px; padding: 8px; }
      .week-col-head {
        background: var(--dark-blue); color: #fff; padding: 12px;
        text-align: center; font-weight: 700; font-size: 12px;
      }
      .week-col-head .num { font-size: 22px; font-weight: 800; }
      .week-col.today { background: linear-gradient(180deg, #fff 0%, var(--clear-blue-bg) 100%); }
      .week-card {
        background: #fff; border-left: 3px solid; border-radius: 8px;
        padding: 8px 10px; margin-bottom: 6px; cursor: pointer;
        transition: all 0.15s; border: 1px solid var(--lightest-grey);
      }
      .week-card:hover { transform: translateX(2px); border-color: var(--nimbus-blue); }

      /* Kanban for Beneficios */
      .kanban {
        display: grid;
        grid-template-columns: repeat(5, minmax(220px, 1fr));
        gap: 12px;
        overflow-x: auto;
      }
      .kanban-col {
        background: #f4f4f5;
        border-radius: 10px;
        padding: 10px;
        min-height: 400px;
      }
      .kanban-head {
        display: flex; align-items: center; gap: 8px;
        font-size: 11px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.05em;
        color: var(--dark-blue);
        margin-bottom: 10px; padding: 4px;
        border-bottom: 1px solid var(--lightest-grey);
        padding-bottom: 8px;
      }
      .kanban-head .stage-num {
        width: 22px; height: 22px; border-radius: 100px;
        background: #fff; color: var(--dark-blue);
        display: inline-flex; align-items: center; justify-content: center;
        font-size: 11px; font-weight: 800;
        border: 1px solid var(--lightest-grey);
      }
      .kanban-head .count {
        margin-left: auto; font-size: 10px;
        background: #fff; padding: 2px 8px; border-radius: 100px;
        border: 1px solid var(--lightest-grey); color: var(--mid-grey);
      }
      .kanban-card {
        background: #fff; border-radius: 8px;
        padding: 10px; margin-bottom: 6px;
        border: 1px solid #e4e4e7;
        border-left: 2px solid var(--nimbus-blue);
        cursor: pointer; transition: all 0.12s;
      }
      .kanban-card:hover {
        border-color: var(--nimbus-blue);
        box-shadow: 0 4px 8px -4px rgba(0,80,195,0.1);
      }

      /* Benefit type pills */
      .ben-pill-ugc_estandar { background: #ffe4f0; color: #be185d; }
      .ben-pill-ugc_studio   { background: #ede9fe; color: #5b21b6; }
      .ben-pill-sponsorship  { background: #dbeafe; color: #1e40af; }
      .ben-pill-pocket_event { background: #fef3c7; color: #92400e; }

      /* Capacity widget */
      .cap-card {
        background: #fff; border-radius: 10px; padding: 14px;
        border: 1px solid #e4e4e7;
        min-width: 170px; flex: 1;
        transition: border-color 0.12s;
      }
      .cap-card:hover { border-color: #d4d4d8; }
      .cap-bar {
        height: 6px; border-radius: 100px;
        background: var(--lightest-grey); margin-top: 6px; overflow: hidden;
      }
      .cap-bar-fill {
        height: 100%; border-radius: 100px;
      }

      /* Stage tracker (in detail drawer) */
      .stage-track {
        display: flex; align-items: center;
        background: var(--light-grey-bg);
        border-radius: 100px; padding: 4px;
        margin-bottom: 16px; gap: 2px;
      }
      .stage-track-step {
        flex: 1; padding: 8px 6px; border-radius: 100px;
        font-size: 10px; font-weight: 700; text-align: center;
        background: transparent; color: var(--mid-grey);
        cursor: pointer; transition: all 0.15s;
        white-space: nowrap;
      }
      .stage-track-step.done { color: #fff; background: var(--success); }
      .stage-track-step.current { color: #fff; background: var(--nimbus-blue); box-shadow: 0 2px 8px rgba(0,80,195,0.25); }
      .stage-track-step:hover { background: rgba(0,80,195,0.1); color: var(--nimbus-blue); }
      .stage-track-step.current:hover, .stage-track-step.done:hover { color: #fff; }

      /* Tab */

o exige hoy. ¿Qué tenés que saber ahora mismo para operar con éxito? 💡 ✅Tu nuevo Portal está listo: Ya podés visualizar tu tier asignado basado en tu performance de los últimos 12 meses. Los niveles se actualizan mensualmente para subir, dándote mayor estabilidad. ✅Tu performance determina tu crecimiento: El GMV generado por las tiendas que gestionás y las nuevas tiendas del año definen tus beneficios. ✅ Si aún no completaste la certificación en Partners Academy, ¡el momento es ahora! Este es el punto de partida para crecer en el programa y garantizar valor a tus clientes con los estándares del equipo de Tiendanube. Con la certificación oficial, tu agencia está lista para seguir creciendo y generando impacto. ¡Conocé los nuevos niveles del programa! 👉 Link CAN", "status": "programado", "prioridad": "", "owners": [], "links": [], "comentarios": "Semana: SEMANA 1. Día: Martes. Template: .", "aprobador": "", "facturado": null, "cobrado": null, "_source_section": "comunidad"}, {"id": "comunidad-cierre-de-mes-resultados-tu-performance-2026-05-07", "tipo": "comunidad", "categoria": "comunidad", "tag": "", "titulo": "Cierre de mes resultados Tu performance", "fecha": "2026-05-07", "fecha_fin": null, "cluster": "ALL", "audiencia": ["Partners"], "canales": ["Email"], "formato": "", "pilar": "Novedades | Performance", "contenido": "Cierre de mes resultados Tu performance mensual define tu crecimiento: revisá tu tier, GMV y oportunidades para escalar el próximo mes.", "copy": "[Link comm por mail]", "status": "programado", "prioridad": "", "owners": [], "links": [], "comentarios": "Semana: SEMANA 1. Día: Jueves. Template: .", "aprobador": "", "facturado": null, "cobrado": null, "_source_section": "comunidad"}, {"id": "comunidad-reminder-comisiones-hot-sale-antes-2026-05-07", "tipo": "comunidad", "categoria": "comunidad", "tag": "", "titulo": "Reminder comisiones + Hot Sale Antes", "fecha": "2026-05-07", "fecha_fin": null, "cluster": "ALL", "audiencia": ["Partners"], "canales": ["Comunidad - Avisos"], "formato": "", "pilar": "Operación | Procesos", "contenido": "Reminder comisiones + Hot Sale Antes del Hot Sale, asegurá la correcta atribución de tus tiendas para no perder comisiones ni impacto en tu tier.", "copy": "Atribución y comisiones: checklist pre-Hot Sale🚀 ¡Hola comunidad! Antes de que explote el Hot Sale, aseguremos que cada venta cuente para tu agencia. Repaso rápido de cómo es la atribución: ✅ ¿Cómo se te asignan las ventas? Si sos Partner creador o estás vinculado como Partner de gestión en el Portal, la atribución es automática. Todo el GMV (facturación de tu cliente) del evento impacta en tu tier del mes que viene. ✅ Suben las ventas = sube tu comisión: si tus clientes cambian a planes más altos por el pico de ventas, tu comisión sobre el costo del plan también escala. 📈 ✅ ¿Qué hacer si una tienda no aparece? No esperes al post-evento. Si falta una tienda en tu Portal: 1️⃣ Validá tu ID: chequeá el tutorial paso a paso con capturas acá: 👉 [Link a screenshots] 2️⃣ Reportá: si el ID está ok pero no impacta, escribí a socios@tiendanube.com o contactate con soporte desde tu Portal. 💡 Tip de oro: vinculá tus tiendas activas antes del lunes. ¡Que no se escape ninguna comisión! ¡Buenas ventas y a romperla! ⚡", "status": "programado", "prioridad": "", "owners": [], "links": [], "comentarios": "Semana: SEMANA 1. Día: Jueves. Template: .", "aprobador": "", "facturado": null, "cobrado": null, "_source_section": "comunidad"}, {"id": "comunidad-tip-viernes-previa-hot-sale-prepará-2026-05-08", "tipo": "comunidad", "categoria": "comunidad", "tag": "", "titulo": "Tip viernes previa Hot Sale Prepará", "fecha": "2026-05-08", "fecha_fin": null, "cluster": "ALL", "audiencia": ["Partners"], "canales": ["Comunidad - Avisos"], "formato": "", "pilar": "Tips | Consejos & quick wins", "contenido": "Tip viernes previa Hot Sale Prepará a tus clientes para el Hot Sale con recursos accionables que impactan directo en conversión.", "copy": "Tip de viernes 🔥: 3 optimizaciones de checkout para Hot Sale ¡Se viene Hot Sale 2026! 🚀 Te compartimos 3 mejoras que subieron entre un 5% y 12% la conversión en tiendas de Tiendanube durante el último gran evento para que las repliques esta temporada: 1️⃣ Transparencia en envíos: configurá la calculadora visible antes del checkout. El \"costo sorpresa\" sigue siendo el motivo \\#1 de abandono de carrito. 🚚 2️⃣ Checkout de un solo paso: menos campos = más ventas. Según nuestros datos, esta es la mejora con mayor impacto directo en la tasa de conversión, especialmente en mobile. 📱 3️⃣ Promos bancarias a la vista: no esperes al pago para mostrar las cuotas. Reforzá los beneficios de Pago Nube o cuotas sin interés con banners desde el carrito. 💳 ¿Querés el checklist completo de jugadas estratégicas para 2026? Accedé a los recursos para agencias en Partner Academy: 👉 [LINK] ¡Buen fin de semana y a preparar esas tiendas para romperla! ⚡", "status": "programado", "prioridad": "", "owners": [], "links": [], "comentarios": "Semana: SEMANA 1. Día: Viernes. Template: .", "aprobador": "", "facturado": null, "cobrado": null, "_source_section": "comunidad"}, {"id": "comunidad-reminder-certificación-oficial-certificación-necesaria-para-2026-05-11", "tipo": "comunidad", "categoria": "comunidad", "tag": "", "titulo": "Reminder Certificación oficial Certificación necesaria para", "fecha": "2026-05-11", "fecha_fin": null, "cluster": "ALL", "audiencia": ["Partners"], "canales": ["Email"], "formato": "", "pilar": "Adopción | Partner Program", "contenido": "Reminder Certificación oficial Certificación necesaria para operar", "copy": "Formas parte del Programa de Partners de Tiendanube y queremos recordarte un paso esencial para tu evolución: la certificación oficial. Más que un requisito formal, es el punto de partida para que crezcas dentro del programa. La certificación garantiza que dominas los fundamentos de la plataforma, entregas más valor a tus clientes y estás preparado para acceder a los próximos niveles de sociedad, con nuevos beneficios y oportunidades. Si aún no lo has hecho, es el momento ideal para empezar. [LINK] Si ya lo hiciste y emitiste el certificado, puedes ignorar este mensaje. Otro punto importante: aprovecha para actualizar tus datos en Cademí, nuestra plataforma de aprendizaje. Siempre que sea posible, utiliza la misma información registrada en el Programa de Socios. Esto nos ayuda a identificar correctamente tu trayectoria y garantizar que recibas todos los reconocimientos del programa. ¡Cualquier duda, estamos a tu disposición!", "status": "programado", "prioridad": "", "owners": [], "links": [], "comentarios": "Semana: SEMANA 2. Día: Lunes. Template: .", "aprobador": "", "facturado": null, "cobrado": null, "_source_section": "comunidad"}, {"id": "comunidad-activación-hotsale-día-1-landing-2026-05-11", "tipo": "comunidad", "categoria": "comunidad", "tag": "", "titulo": "Activación HotSale día 1 - landing", "fecha": "2026-05-11", "fecha_fin": null, "cluster": "ALL", "audiencia": ["Partners"], "canales": ["Comunidad - Avisos"], "formato": "", "pilar": "Tips | Consejos & quick wins", "contenido": "Activación HotSale día 1 - landing page y recursos", "copy": "", "status": "programado", "prioridad": "", "owners": [], "links": [], "comentarios": "Semana: SEMANA 2. Día: lunes. Template: .", "aprobador": "", "facturado": null, "cobrado": null, "_source_section": "comunidad"}, {"id": "comunidad-push-nuevo-programa-encuesta-entendé-2026-05-13", "tipo": "comunidad", "categoria": "comunidad", "tag": "", "titulo": "Push nuevo programa + encuesta Entendé", "fecha": "2026-05-13", "fecha_fin": null, "cluster": "ALL", "audiencia": ["Partners"], "canales": ["Comunidad - Avisos"], "formato": "", "pilar": "Adopción | Partner Program", "contenido": "Push nuevo programa + encuesta Entendé qué cambia en el nuevo programa, cómo te impacta y compartí tu feedback para co-construirlo.", "copy": "El Partner Program evoluciona. ¿Estás listo para el siguiente nivel? , "prioridad": "", "owners": [], "links": [], "comentarios": "", "aprobador": "Agustina Carra", "facturado": null, "cobrado": null, "_source_section": "milestones"}, {"id": "jun-01-pd-reminder-email", "tipo": "comunicacion", "categoria": "email", "tag": "PRODUCT DIGEST", "titulo": "📽 Mañana es nuestro Product Digest exclusivo — el que define tus próximas propuestas", "fecha": "2026-06-02", "cluster": "ALL", "audiencia": ["Agencies"], "canales": ["Email"], "formato": "Convocatoria", "pilar": "Producto · Lanzamientos", "contenido": "Reminder previo al Product Digest del 4/6. Foco: anuncio + valor del evento + agenda + link.", "copy": "¡Hola partner!\n\nTe escribo porque mañana, jueves 4 de junio, tenemos nuestro Product Digest del mes — la sesión en vivo donde los especialistas de producto de Tiendanube desglosan los últimos lanzamientos directamente para vos.\n\n📽 ¿Qué vas a llevarte?\n· La lógica técnica detrás de las actualizaciones más recientes\n· El roadmap de innovación que viene los próximos 90 días\n· Las claves comerciales para transformar cada release en propuestas de consultoría y servicios de alto valor para tu agencia\n\nYa estás inscripto, pero queríamos asegurarnos de que tengas el link y la agenda a mano. Te dejamos todo acá:\n\n🔗 [Link al webinar]\n📅 4 de junio · 16hs ARG\n⏱ 60 minutos + Q&A\n\nNo te quedes afuera 👀 — el Product Digest es donde aparecen primero las features que vas a ofrecer a tus clientes el próximo trimestre.\n\nNos vemos mañana.\n— Equipo Partner Marketing Tiendanube", "status": "programado", "prioridad": "P1", "owners": ["Daniela Pereyra"], "links": [{"label": "Inscripción Product Digest", "url": "#"}], "comentarios": "", "_source_section": "estrategia_junio_2026", "fecha_fin": null, "aprobador": "", "facturado": null, "cobrado": null}, {"id": "jun-02-cobros-wpp", "tipo": "comunicacion", "categoria": "whatsapp", "tag": "OPERATIVO", "titulo": "Cobro de comisiones · checklist mensual", "fecha": "2026-06-02", "cluster": "ALL", "audiencia": ["Agencies"], "canales": ["WhatsApp"], "formato": "Comunidad WhatsApp", "pilar": "Operación · Procesos", "contenido": "Recordatorio mensual de cobro · checklist rápido para no demorar pagos.", "copy": "☀️ Arrancamos junio, partner.\n\nSi tenés comisiones pendientes de cobro del mes pasado, este es el recordatorio mensual: chequeá tu Portal y validá que tus datos de facturación estén actualizados para no demorar el cobro.\n\n📋 Checklist rápido (60 segundos):\n1️⃣ CUIT correcto y al día\n2️⃣ Factura sin IVA cargada en el panel\n3️⃣ Tiendas vinculadas al ID de tu agencia\n\n🔗 Cómo cobrar tus comisiones paso a paso: https://ayuda.tiendanube.com/es_ES/mi-cuenta-socios/como-puedo-cobrar-mis-comisiones-de-socio\n\nDudas? Respondé acá y te ayudamos.", "status": "programado", "prioridad": "P2", "owners": ["Daniela Pereyra"], "links": [{"label": "Ayuda · Cobro de comisiones", "url": "https://ayuda.tiendanube.com/es_ES/mi-cuenta-socios/como-puedo-cobrar-mis-comisiones-de-socio"}], "_source_section": "estrategia_junio_2026", "fecha_fin": null, "aprobador": "", "facturado": null, "cobrado": null}, {"id": "jun-03-newsletter-placeholder", "tipo": "comunicacion", "categoria": "newsletter", "tag": "NEWSLETTER", "titulo": "Newsletter Junio · Partners (automatizado)", "fecha": "2026-06-03", "cluster": "ALL", "audiencia": ["Partners"], "canales": ["Email"], "formato": "Newsletter mensual", "pilar": "Novedades · Informativo", "contenido": "Newsletter mensual de junio. PLACEHOLDER · automatizado por otro lado.", "copy": "", "status": "programado", "prioridad": "P2", "owners": ["Sistema (auto)"], "links": [], "comentarios": "Automatizado · no hace falta armarlo desde acá, solo marcado como placeholder en el calendario.", "_source_section": "estrategia_junio_2026", "fecha_fin": null, "aprobador": "", "facturado": null, "cobrado": null}, {"id": "jun-05-prode-plantilla-vacia-wpp", "tipo": "comunicacion", "categoria": "whatsapp", "tag": "PRODE + TIPS", "titulo": "⚡ Tip de viernes — Prode edition (plantilla vacía)", "fecha": "2026-06-05", "cluster": "ALL", "audiencia": ["Agencies"], "canales": ["WhatsApp"], "formato": "Comunidad WhatsApp", "pilar": "Tips + Oportunidades (combinado)", "contenido": "Combo tip de viernes + alerta para quienes no cargaron Prode. Premios + deadline 11/6 18hs + tip GMV bonus.", "copy": "⚡ Tip de viernes — Prode edition\n\nSi tu agencia se anotó al Prode Mundial 2026 pero todavía no entraste a cargar pronósticos, este es el aviso: no te quedes en el banco 👟\n\n⏰ El sistema bloquea cargas el 11/6 a las 18hs ARG. Si no completaste antes de esa hora, perdés los primeros 3 partidos de grupos (incluido Argentina vs Argelia el 16/6).\n\n🎯 Por qué te conviene jugar:\n· 1er puesto: Smart TV 50\" Philips 📺\n· 2do puesto: Camiseta oficial de la Selección 🇦🇷\n· 3er puesto: Soundbar Philips 🔊\n\n🔗 Entrá ahora y cargá tu primera estrategia: [link plataforma Prode]\n\nPD: tip del viernes \"real\" → si todavía no implementaste pricing dinámico en tus clientes para Hot Sale, este es el mes. Te dejamos el playbook de Partners Academy → [link Checklist para escalar conversiones]", "status": "programado", "prioridad": "P1", "owners": ["Daniela Pereyra"], "links": [{"label": "Plataforma Prode", "url": "#"}, {"label": "Checklist escalar conversiones", "url": "#"}], "_source_section": "estrategia_junio_2026", "fecha_fin": null, "aprobador": "", "facturado": null, "cobrado": null}, {"id": "jun-08-tecnomoda-1", "tipo": "comunicacion", "categoria": "email", "tag": "TECNOMODA", "titulo": "⚡ Tecnomoda 2026 · tu agencia puede ser parte del único evento que une moda y tech", "fecha": "2026-06-08", "cluster": "ALL", "audiencia": ["Agencies"], "canales": ["Email"], "formato": "Email convocatoria", "pilar": "Oportunidades · Crecimiento", "contenido": "Anuncio Tecnomoda + propuesta de sponsoreo. Primer email de la serie (3 emails escalando hasta 1/7).", "copy": "Partner,\n\nSe viene Tecnomoda 2026 — el único evento del país que reúne moda, tech y e-com
